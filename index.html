          setEditingHeader(null);
        }
      };

      // Live link verification: DNS + optional content, with proxy fallbacks.
      // Strong domain↔name match + DNS success is enough — do not fail solely because proxies are down.
      const verifyDomainLive = async (domain, companyName, options = {}) => {
        const log = (...args) => console.log('[verify]', domain, ...args);
        const cleanDom = String(domain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0].trim();
        const cleanComp = String(companyName || '').toLowerCase().trim();
        const cacheKey = makeVerifyCacheKey(cleanDom, cleanComp);

        if (verifyCache.has(cacheKey)) {
          const cached = verifyCache.get(cacheKey);
          log('CACHE HIT', cached.ok ? 'OK' : 'FAIL', cached.reason);
          return { ...cached, fromCache: true };
        }

        const storeVerify = (result) => {
          verifyCache.set(cacheKey, result);
          return result;
        };

        if (!cleanDom || !cleanDom.includes('.')) {
          log('FAIL invalid domain');
          return storeVerify({ ok: false, reason: 'Invalid domain' });
        }
        if (/\b(unknown|random|test|asdf)\b/.test(cleanComp)) {
          log('FAIL placeholder name');
          return storeVerify({ ok: false, reason: 'Placeholder company name' });
        }
        if (cleanDom.includes('invalid-link.fake') || cleanDom.includes('asdf')) {
          log('FAIL blocked domain');
          return storeVerify({ ok: false, reason: 'Blocked domain' });
        }

        const stripLegal = (s) => s
          .toLowerCase()
          .replace(/[,.]?\s*\b(inc|llc|l\.l\.c|co|corp|corporation|ltd|limited|gmbh|plc|llp|lp|sa|nv|bv|pvt|foundation|university|office|department|ministry)\b\.?/gi, ' ')
          .replace(/[^a-z0-9\s]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();

        const nameKey = stripLegal(cleanComp).replace(/\s+/g, '');
        const domParts = cleanDom.split('.');
        const domBase = (domParts.length > 2 && !['co', 'com', 'org', 'net', 'gov', 'edu'].includes(domParts[domParts.length - 2])
          ? domParts[domParts.length - 2]
          : domParts[0]).replace(/[^a-z0-9]/g, '');

        const domainStrongMatch = (() => {
          if (!nameKey || !domBase) return false;
          if (domBase === nameKey) return true;
          // Domain contains the brand (fordfoundation.org ↔ Ford Foundation → "ford")
          if (nameKey.length >= 3 && (domBase.includes(nameKey) || nameKey.includes(domBase))) {
            const ratio = Math.min(domBase.length, nameKey.length) / Math.max(domBase.length, nameKey.length);
            if (ratio >= 0.5 || domBase.startsWith(nameKey) || nameKey.startsWith(domBase)) return true;
          }
          // multi-word collapsed: "westvirginiauniversity" vs domain tokens
          const tokens = stripLegal(cleanComp).split(' ').filter(t => t.length > 2);
          if (tokens.length >= 2) {
            const joined = tokens.join('');
            if (domBase === joined || joined.includes(domBase) || domBase.includes(joined.slice(0, Math.min(12, joined.length)))) return true;
            if (tokens.filter(t => domBase.includes(t) || cleanDom.includes(t)).length >= Math.ceil(tokens.length * 0.6)) return true;
          }
          return false;
        })();

        log('domainStrongMatch=', domainStrongMatch, 'domBase=', domBase, 'nameKey=', nameKey, 'fastPath=', !!options.fastPath);

        // 1) DNS check via Google DNS-over-HTTPS
        let dnsOk = false;
        try {
          const dnsRes = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(cleanDom)}&type=A`);
          if (dnsRes.ok) {
            const dnsJson = await dnsRes.json();
            dnsOk = dnsJson.Status === 0 && Array.isArray(dnsJson.Answer) && dnsJson.Answer.length > 0;
            log('DNS', dnsOk ? 'OK' : 'FAIL', 'status=', dnsJson.Status, 'answers=', dnsJson.Answer?.length || 0);
          } else {
            log('DNS HTTP', dnsRes.status);
          }
        } catch (e) {
          log('DNS error', e.message || e);
        }

        if (!dnsOk) {
          // Retry once (short backoff)
          try {
            await new Promise(r => setTimeout(r, 200));
            const dnsRes = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(cleanDom)}&type=A`);
            const dnsJson = await dnsRes.json();
            dnsOk = dnsJson.Status === 0 && Array.isArray(dnsJson.Answer) && dnsJson.Answer.length > 0;
            log('DNS retry', dnsOk ? 'OK' : 'FAIL');
          } catch (e) {
            log('DNS retry error', e.message || e);
          }
        }

        if (!dnsOk) {
          log('FAIL DNS does not resolve');
          return storeVerify({ ok: false, reason: 'Domain does not resolve (DNS)' });
        }

        // Strong signal / known fast path: domain closely matches name + DNS → verified (skip proxies)
        if (domainStrongMatch || options.fastPath || isKnownUnambiguousCompany(companyName)) {
          log('PASS strong domain+DNS match (content fetch skipped)');
          return storeVerify({ ok: true, reason: 'Verified via DNS + domain/name match' });
        }

        // 2) Content fetch via proxy waterfall (best-effort when domain match is weak)
        // Fail fast: short per-proxy timeouts, then move on. One retry round only.
        const targetUrl = `https://${cleanDom}`;
        const proxyBuilders = [
          (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
          (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
          (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
          (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
        ];
        const proxyTimeoutsMs = [2200, 2500, 2800, 3000];

        const fetchViaProxies = async () => {
          let lastErr = '';
          for (let attempt = 0; attempt < 2; attempt++) {
            for (let i = 0; i < proxyBuilders.length; i++) {
              const proxyUrl = proxyBuilders[i](targetUrl);
              const timeoutMs = proxyTimeoutsMs[i] || 3000;
              try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                log(`proxy#${i} attempt ${attempt + 1} (${timeoutMs}ms)…`);
                const pageRes = await fetch(proxyUrl, { signal: controller.signal });
                clearTimeout(timeout);
                if (!pageRes.ok) {
                  lastErr = `proxy#${i} HTTP ${pageRes.status}`;
                  log(lastErr);
                  continue;
                }
                let html = await pageRes.text();
                // allorigins /get returns JSON { contents }
                if (html.trim().startsWith('{') && html.includes('"contents"')) {
                  try {
                    const parsed = JSON.parse(html);
                    html = parsed.contents || '';
                  } catch (_) {}
                }
                if (html && html.length >= 40) {
                  log(`proxy#${i} OK len=${html.length}`);
                  return html;
                }
                lastErr = `proxy#${i} empty body`;
                log(lastErr);
              } catch (e) {
                lastErr = `proxy#${i} ${e.name || 'err'}: ${e.message || e}`;
                log(lastErr);
              }
            }
            if (attempt === 0) await new Promise(r => setTimeout(r, 250));
          }
          throw new Error(lastErr || 'All proxies failed');
        };

        const tokens = stripLegal(cleanComp).split(' ').map(t => t.replace(/[^a-z0-9]/g, '')).filter(t => t.length > 2);

        try {
          const html = await fetchViaProxies();
          const lower = html.toLowerCase();

          if (/\b404\b/.test(lower) && /not found|doesn't exist|does not exist|page not found/.test(lower) && html.length < 5000) {
            log('FAIL soft 404');
            return storeVerify({ ok: false, reason: 'Page looks like a 404' });
          }

          const title = (html.match(/<title[^>]*>([^<]*)<\/title>/i)?.[1] || '').toLowerCase();
          const metaDesc = (
            html.match(/<meta[^>]+name=["']description["'][^>]+content=["']([^"']+)["']/i)?.[1] ||
            html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+name=["']description["']/i)?.[1] ||
            html.match(/<meta[^>]+property=["']og:description["'][^>]+content=["']([^"']+)["']/i)?.[1] ||
            ''
          ).toLowerCase();
          const headers = [...html.matchAll(/<h[1-3][^>]*>([\s\S]*?)<\/h[1-3]>/gi)]
            .slice(0, 8)
            .map(m => m[1].replace(/<[^>]+>/g, ' ').toLowerCase())
            .join(' ');

          const focusCorpus = `${title} ${metaDesc} ${headers} ${domBase}`.slice(0, 6000);
          const fullNeedle = stripLegal(cleanComp);

          const fuzzyHit = (corpus, needle) => {
            if (!needle) return false;
            if (corpus.includes(needle)) return true;
            if (corpus.includes(needle.replace(/\s+/g, ''))) return true;
            return false;
          };

          if (fuzzyHit(focusCorpus, fullNeedle) || fuzzyHit(focusCorpus, nameKey)) {
            log('PASS content fuzzy match on title/meta/headers');
            return storeVerify({ ok: true, reason: 'Verified via DNS + page content match' });
          }

          if (tokens.length === 0) {
            const ok = focusCorpus.includes(nameKey);
            log(ok ? 'PASS' : 'FAIL', 'short-name content check');
            return storeVerify(ok
              ? { ok: true, reason: 'Verified via DNS + page content match' }
              : { ok: false, reason: 'Page content does not match company name' });
          }

          const hits = tokens.filter(t => focusCorpus.includes(t) || lower.slice(0, 12000).includes(t));
          const needed = Math.max(1, Math.ceil(tokens.length * 0.5));
          log('content token hits', hits.length, '/', tokens.length, 'needed', needed, hits);

          if (hits.length >= needed) {
            return storeVerify({ ok: true, reason: 'Verified via DNS + page content match' });
          }

          // Weak domain affinity + DNS already passed — accept rather than over-reject
          if (nameKey.length >= 4 && (domBase.includes(nameKey.slice(0, 4)) || nameKey.includes(domBase.slice(0, 4)))) {
            log('PASS weak domain affinity after partial content');
            return storeVerify({ ok: true, reason: 'Verified via DNS + partial domain/content signals' });
          }

          log('FAIL content mismatch');
          return storeVerify({
            ok: false,
            reason: `Page content does not match company name (matched ${hits.length}/${tokens.length} tokens)`
          });
        } catch (e) {
          log('proxy waterfall failed:', e.message || e);
          // Proxies are unreliable — if DNS resolved and there is any domain affinity, accept
          if (nameKey.length >= 3 && (domBase.includes(nameKey.slice(0, Math.min(4, nameKey.length))) || nameKey.includes(domBase.slice(0, Math.min(4, domBase.length))))) {
            log('PASS DNS + domain affinity after proxy failure');
            return storeVerify({ ok: true, reason: 'Verified via DNS (content proxy unavailable)' });
          }
          log('FAIL could not confirm without content or domain match');
          return storeVerify({ ok: false, reason: 'Could not fetch page to confirm company match' });
        }
      };

      useEffect(() => {
        if (editingCell && editInputRef.current) {
          editInputRef.current.focus();
          editInputRef.current.select();
        }
      }, [editingCell]);

      useEffect(() => {
        rowsRef.current = rows;
      }, [rows]);

      const getDelayFactor = () => {
        if (latencySpeed === 'calm') return 1.8;
        if (latencySpeed === 'fast') return 0.15;
        return 0.35; // default: keep a little pacing without multi-second padding
      };

      // Fill concurrent worker slots from the queue
      useEffect(() => {
        const free = ENRICH_CONCURRENCY - activeIds.length;
        if (free > 0 && queue.length > 0) {
          const take = queue.slice(0, free);
          if (!batchStartedAtRef.current) {
            batchStartedAtRef.current = performance.now();
            console.log(`[batch] starting with concurrency=${ENRICH_CONCURRENCY}`);
          }
          setQueue(q => q.slice(take.length));
          setActiveIds(ids => [...ids, ...take]);
          setIsProcessingActive(true);
          return;
        }

        if (queue.length === 0 && activeIds.length === 0 && isProcessingActive) {
          const elapsed = batchStartedAtRef.current
            ? ((performance.now() - batchStartedAtRef.current) / 1000).toFixed(1)
            : '?';
          console.log(`[batch] complete in ${elapsed}s`);
          batchStartedAtRef.current = null;
          const successCount = rows.filter(r => r.status === 'found').length;
          if (successCount > 0) {
            window.confetti?.({
              particleCount: 80,
              spread: 60,
              origin: { y: 0.8 },
              colors: ['#5B7FA6', '#7DB89A', '#D8E2EC', '#A5C4D4']
            });
          }
          setIsProcessingActive(false);
        }
      }, [queue, activeIds, isProcessingActive, rows]);

      // Launch workers for newly active row IDs
      useEffect(() => {
        const release = (id) => {
          inFlightRef.current.delete(id);
          setActiveIds(ids => ids.filter(x => x !== id));
        };

        activeIds.forEach((rowId) => {
          if (inFlightRef.current.has(rowId)) return;
          inFlightRef.current.add(rowId);

          (async () => {
            const factor = getDelayFactor();
            const rowToProcess = rowsRef.current.find(r => r.id === rowId);
            if (!rowToProcess) {
              release(rowId);
              return;
            }

            const compKey = getCompanyColumnKey();
            const webKey = getWebsiteColumnKey();
            const indKey = getIndustryColumnKey();
            const hcKey = getHeadcountColumnKey();
            const locKey = getLocationColumnKey();
            const conKey = getContactsColumnKey();
            const genKey = getGenderColumnKey();
            const noteKey = getNotesColumnKey();

            const companyName = rowToProcess[compKey];
            const personContext = {
              personName: rowToProcess.personName || '',
              personTitle: rowToProcess.personTitle || ''
            };

            const finishUnverified = (fields) => {
              updateRow(rowId, { status: 'unverified', linkVerified: false, ...fields });
              release(rowId);
            };

            try {
              if (!companyName || !companyName.trim() || companyName === '-') {
                finishUnverified({
                  [webKey]: '',
                  [indKey]: '-',
                  [hcKey]: '-',
                  [locKey]: '-',
                  [conKey]: '-',
                  [genKey]: '-',
                  [noteKey]: rowToProcess[noteKey] && rowToProcess[noteKey] !== 'Queueing...' && rowToProcess[noteKey] !== '-'
                    ? rowToProcess[noteKey]
                    : 'No company name provided',
                  resolveMethod: 'none'
                });
                return;
              }

              if (isNonEntityCompany(companyName)) {
                finishUnverified({
                  [webKey]: '',
                  [noteKey]: [rowToProcess[noteKey], 'Skipped: not a searchable company entity'].filter(n => n && n !== '-' && n !== 'Queueing...').join(' · '),
                  resolveMethod: 'skipped-non-entity'
                });
                return;
              }

              let domain = rowToProcess[webKey];
              let isDomainPrepopulated = !!domain && domain.includes('.') && domain !== '-';
              let isUnsure = false;
              let apiData = null;
              let industrySnippet = '';
              let alternatives = [];
              let resolveMethod = 'name-only';
              let fastPath = false;
              const skippedDomains = rowToProcess.skippedDomains || [];

              if (!isDomainPrepopulated) {
                updateRow(rowId, { status: 'searching' });
                const delayStart = Date.now();
                const usePerson = isAmbiguousCompanyName(companyName) && !isKnownUnambiguousCompany(companyName);
                const resolvedObj = await resolveDomain(
                  companyName,
                  financeFilterActive,
                  skippedDomains,
                  usePerson ? personContext : null
                );
                const elapsed = Date.now() - delayStart;
                // Tiny pacing only — never pad to 1s+ on fast path / cache hits
                if (!resolvedObj?.fastPath && !resolvedObj?.fromCache) {
                  const remainingDelay = (180 * factor) - elapsed;
                  if (remainingDelay > 0) await new Promise(r => setTimeout(r, remainingDelay));
                }

                if (resolvedObj && resolvedObj.domain) {
                  domain = resolvedObj.domain;
                  isUnsure = !!resolvedObj.isUnsure;
                  apiData = resolvedObj.apiData || null;
                  industrySnippet = resolvedObj.industrySnippet || resolvedObj.matchedName || '';
                  alternatives = resolvedObj.alternatives || [];
                  resolveMethod = resolvedObj.resolveMethod || 'name-only';
                  fastPath = !!resolvedObj.fastPath || isKnownUnambiguousCompany(companyName);

                  updateRow(rowId, { status: 'verifying', [webKey]: domain, resolveMethod });
                  const verification = await verifyDomainLive(domain, companyName, { fastPath });
                  if (!verification.ok) {
                    finishUnverified({
                      [webKey]: '',
                      [indKey]: industrySnippet || '-',
                      [hcKey]: '-',
                      [locKey]: '-',
                      [conKey]: '-',
                      [genKey]: '-',
                      [noteKey]: [rowToProcess[noteKey] !== 'Queueing...' ? rowToProcess[noteKey] : '', verification.reason, alternatives.length ? `Candidates: ${alternatives.join(' · ')}` : ''].filter(Boolean).join(' · '),
                      matchSnippet: industrySnippet,
                      resolveMethod
                    });
                    return;
                  }

                  if (isUnsure) {
                    updateRow(rowId, {
                      status: 'potential',
                      [webKey]: domain,
                      [indKey]: industrySnippet || '-',
                      [hcKey]: '-',
                      [locKey]: '-',
                      [conKey]: '-',
                      [genKey]: '-',
                      [noteKey]: [rowToProcess[noteKey] !== 'Queueing...' ? rowToProcess[noteKey] : '', alternatives.length ? `Ambiguous matches: ${alternatives.join(' · ')}` : 'Possible match needs manual confirmation'].filter(Boolean).join(' · '),
                      matchSnippet: industrySnippet,
                      linkVerified: false,
                      resolveMethod
                    });
                    release(rowId);
                    return;
                  }

                  updateRow(rowId, { [webKey]: domain, status: 'enriching', matchSnippet: industrySnippet, linkVerified: true, resolveMethod });
                } else {
                  finishUnverified({
                    [webKey]: '',
                    [indKey]: '-',
                    [hcKey]: '-',
                    [locKey]: '-',
                    [conKey]: '-',
                    [genKey]: '-',
                    [noteKey]: [rowToProcess[noteKey] !== 'Queueing...' ? rowToProcess[noteKey] : '', 'Could not resolve a verified domain'].filter(Boolean).join(' · '),
                    resolveMethod: resolveMethod || 'none'
                  });
                  return;
                }
              } else {
                updateRow(rowId, { status: 'verifying' });
                const verification = await verifyDomainLive(domain, companyName, { fastPath: isKnownUnambiguousCompany(companyName) });
                if (!verification.ok) {
                  finishUnverified({
                    [webKey]: '',
                    [noteKey]: verification.reason || 'Link verification failed for manual domain override',
                    resolveMethod: 'manual'
                  });
                  return;
                }
                updateRow(rowId, { status: 'enriching', linkVerified: true, resolveMethod: 'manual' });
              }

              const details = await enrichCompanyDetails(domain, companyName, apiData);
              const priorNotes = rowToProcess[noteKey] && rowToProcess[noteKey] !== 'Queueing...' && rowToProcess[noteKey] !== '-'
                ? rowToProcess[noteKey]
                : '';
              const noteWithSnippet = industrySnippet && details.notes && !details.notes.includes(industrySnippet)
                ? `${details.notes} [${industrySnippet}]`
                : details.notes;
              const mergedNotes = [priorNotes, noteWithSnippet].filter(Boolean).join(' · ');

              updateRow(rowId, {
                [indKey]: rowToProcess[indKey] === '-' || !rowToProcess[indKey] ? details.industry : rowToProcess[indKey],
                [hcKey]: rowToProcess[hcKey] === '-' || !rowToProcess[hcKey] ? details.headcount : rowToProcess[hcKey],
                [locKey]: rowToProcess[locKey] === '-' || !rowToProcess[locKey] ? details.location : rowToProcess[locKey],
                [conKey]: rowToProcess[conKey] === '-' || !rowToProcess[conKey] ? details.contacts : rowToProcess[conKey],
                [genKey]: rowToProcess[genKey] === '-' || !rowToProcess[genKey] ? details.gender : rowToProcess[genKey],
                [noteKey]: mergedNotes,
                status: 'found',
                matchSnippet: industrySnippet,
                linkVerified: true,
                resolveMethod
              });
              release(rowId);
            } catch (err) {
              console.error('[enrich] row failed', rowId, err);
              finishUnverified({
                [noteKey]: 'AI search error',
                resolveMethod: 'error'
              });
            }
          })();
        });
      }, [activeIds, financeFilterActive, latencySpeed]);

      const updateRow = (id, newFields) => {
        setRows(prev => prev.map(row => {
          if (row.id === id) {
            return { ...row, ...newFields };
          }
          return row;
        }));
      };

      const handleParsePreview = () => {
        if (!inputText.trim()) return;
        const lines = inputText.split('\n').filter(line => line.trim().length > 0);
        const preview = lines.map(line => {
          const parsed = parsePersonCompanyLine(line) || {
            raw: line,
            companyName: line.trim(),
            sourceContact: '',
            personName: '',
            personTitle: '',
            notes: ''
          };
          return {
            id: crypto.randomUUID(),
            raw: parsed.raw || line,
            companyName: parsed.companyName || '',
            sourceContact: parsed.sourceContact || '',
            personName: parsed.personName || '',
            personTitle: parsed.personTitle || '',
            notes: parsed.notes || '',
            alternates: parsed.alternates || []
          };
        });
        setParsePreview(preview);
      };

      const updatePreviewRow = (id, fields) => {
        setParsePreview(prev => prev.map(r => r.id === id ? { ...r, ...fields } : r));
      };

      const handleConfirmEnrichment = () => {
        if (!parsePreview || parsePreview.length === 0) return;

        const compKey = getCompanyColumnKey();
        const sourceKey = getSourceContactColumnKey();
        const noteKey = getNotesColumnKey();
        const webKey = getWebsiteColumnKey();

        const newRows = parsePreview.map(p => {
          const rowData = {
            id: crypto.randomUUID(),
            status: 'pending',
            personName: p.personName || '',
            personTitle: p.personTitle || '',
            resolveMethod: '',
            skippedDomains: []
          };
          headers.forEach(h => {
            rowData[h.key] = '-';
          });
          rowData[compKey] = p.companyName || '';
          rowData[sourceKey] = p.sourceContact || '';
          rowData[noteKey] = p.notes || 'Queueing...';
          rowData[webKey] = '';
          return rowData;
        });

        setRows(prev => [...prev, ...newRows]);
        setQueue(prev => [...prev, ...newRows.map(r => r.id)]);
        setParsePreview(null);
        setInputText('');
      };

      const handleRunEnrichment = () => {
        // Back-compat: Ctrl+Enter still works — show preview first
        handleParsePreview();
      };

      const handleAddBlankRow = () => {
        const newRow = {
          id: crypto.randomUUID(),
          status: 'pending'
        };
        headers.forEach(h => {
          newRow[h.key] = '';
        });
        setRows(prev => [...prev, newRow]);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target?.result;
          if (typeof text !== 'string') return;

          let lines = [];
          if (file.name.endsWith('.csv')) {
            const rawLines = text.split(/\r?\n/);
            lines = rawLines.slice(1).filter(l => l.trim().length > 0);
          } else {
            lines = text.split(/\r?\n/).filter(line => line.trim().length > 0);
          }

          if (lines.length > 0) {
            setInputText(lines.join('\n'));
            // Defer preview so inputText state is set for display; parse lines directly
            const preview = lines.map(line => {
              const parsed = parsePersonCompanyLine(line) || {
                raw: line,
                companyName: line.trim(),
                sourceContact: '',
                personName: '',
                personTitle: '',
                notes: ''
              };
              return {
                id: crypto.randomUUID(),
                raw: parsed.raw || line,
                companyName: parsed.companyName || '',
                sourceContact: parsed.sourceContact || '',
                personName: parsed.personName || '',
                personTitle: parsed.personTitle || '',
                notes: parsed.notes || '',
                alternates: parsed.alternates || []
              };
            });
            setParsePreview(preview);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const triggerRowReRun = (rowId) => {
        if (queue.includes(rowId) || activeIds.includes(rowId)) return;

        const noteKey = getNotesColumnKey();
        const webKey = getWebsiteColumnKey();
        
        setRows(prev => prev.map(row => {
          if (row.id === rowId) {
            const currentWebsite = row[webKey] ? row[webKey].trim().toLowerCase() : '';
            const prevSkipped = row.skippedDomains || [];
            const newSkipped = currentWebsite && !prevSkipped.includes(currentWebsite)
              ? [...prevSkipped, currentWebsite]
              : prevSkipped;

            return { 
              ...row, 
              status: 'pending',
              [webKey]: '', // Clear old website to trigger re-lookup
              [noteKey]: 'Re-running enrichment...',
              skippedDomains: newSkipped
            };
          }
          return row;
        }));
        setQueue(prev => [...prev, rowId]);
      };

      const handleCellDoubleClick = (rowId, colName, currentValue) => {
        if (activeIds.includes(rowId)) return;
        setEditingCell({ id: rowId, column: colName });
        setEditingValue(currentValue || '');
      };

      const handleCellSave = () => {
        if (!editingCell) return;

        const { id, column } = editingCell;
        const currentRow = rows.find(r => r.id === id);
        if (!currentRow) return;

        const oldValue = currentRow[column];
        const newValue = editingValue.trim();

        setEditingCell(null);
        if (oldValue === newValue) return;

        updateRow(id, { [column]: newValue });

        // Auto trigger re-enrichment when core variables are corrected
        const compKey = getCompanyColumnKey();
        const webKey = getWebsiteColumnKey();
        if (column === compKey || column === webKey) {
          triggerRowReRun(id);
        }
      };

      const handleCellKeyDown = (e) => {
        if (e.key === 'Enter') {
          handleCellSave();
        } else if (e.key === 'Escape') {
          setEditingCell(null);
        }
      };

      const handleClearTable = () => {
        setRows([]);
        setQueue([]);
        setActiveIds([]);
        inFlightRef.current.clear();
        setIsProcessingActive(false);
        batchStartedAtRef.current = null;
      };

      const handleExportCSV = () => {
        if (rows.length === 0) return;

        const headerLabels = headers.map(h => h.label);
        const csvRows = [headerLabels.map(l => `"${l.replace(/"/g, '""')}"`).join(',')];

        rows.forEach(row => {
          const line = headers.map(h => {
            const val = row[h.key] || '';
            return `"${val.toString().replace(/"/g, '""')}"`;
          });
          csvRows.push(line.join(','));
        });

        const csvContent = csvRows.join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', `company_enrichment_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const getExportMatrix = () => {
        const cols = [{ key: '_status', label: 'Status' }, ...headers];
        const aoa = [cols.map(c => c.label)];
        rows.forEach(row => {
          aoa.push(cols.map(c => {
            if (c.key === '_status') return row.status || '';
            return row[c.key] != null ? String(row[c.key]) : '';
          }));
        });
        return { cols, aoa };
      };

      const handleExportXLSX = () => {
        if (rows.length === 0) return;
        if (!window.XLSX) {
          alert('Excel export library failed to load. Please refresh and try again.');
          return;
        }
        const { aoa } = getExportMatrix();
        const ws = window.XLSX.utils.aoa_to_sheet(aoa);
        ws['!cols'] = aoa[0].map((_, i) => ({
          wch: Math.min(40, Math.max(10, ...aoa.map(r => String(r[i] || '').length)))
        }));
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, 'Enrichment');
        window.XLSX.writeFile(wb, `company_enrichment_${new Date().toISOString().slice(0,10)}.xlsx`);
      };

      const handleExportPDF = () => {
        if (rows.length === 0) return;
        const jspdfMod = window.jspdf;
        if (!jspdfMod || !jspdfMod.jsPDF) {
          alert('PDF export library failed to load. Please refresh and try again.');
          return;
        }
        const { jsPDF } = jspdfMod;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
        const { cols, aoa } = getExportMatrix();
        doc.setFontSize(14);
        doc.text('Company Enrichment Export', 40, 36);
        doc.setFontSize(9);
        doc.setTextColor(100);
        doc.text(`Generated ${new Date().toLocaleString()} · ${rows.length} rows`, 40, 52);
        doc.setTextColor(0);

        if (typeof doc.autoTable !== 'function') {
          alert('PDF table plugin failed to load. Please refresh and try again.');
          return;
        }

        doc.autoTable({
          startY: 64,
          head: [aoa[0]],
          body: aoa.slice(1),
          styles: { fontSize: 7, cellPadding: 3, overflow: 'linebreak' },
          headStyles: { fillColor: [91, 127, 166], textColor: 255 },
          alternateRowStyles: { fillColor: [248, 250, 252] },
          margin: { left: 28, right: 28 }
        });
        doc.save(`company_enrichment_${new Date().toISOString().slice(0,10)}.pdf`);
      };

      const stats = {
        total: rows.length,
        pending: rows.filter(r => r.status === 'pending').length + queue.length,
        searching: rows.filter(r => r.status === 'searching' || r.status === 'verifying' || r.status === 'enriching').length + activeIds.length,
        found: rows.filter(r => r.status === 'found').length,
        potential: rows.filter(r => r.status === 'potential').length,
        unverified: rows.filter(r => r.status === 'unverified').length
      };

      const totalCompleted = stats.total - stats.pending - stats.searching;
      const progressPercent = stats.total > 0 ? Math.round((totalCompleted / stats.total) * 100) : 0;

      return (
        <div className="app-container">
          {/* Header */}
          <header className="top-bar">
            <div className="brand-section">
              <h1 className="brand-title" style={{ display: 'flex', alignItems: 'center', letterSpacing: '0.75px', fontSize: '1.2rem', color: 'var(--text-primary)' }}>
                <span style={{ fontWeight: '800', marginRight: '0.15rem' }}>PLUM</span>
                <span style={{ fontWeight: '300' }}>ALLEY</span>
              </h1>
              <span className="brand-tagline">Paste company names. Get websites and data.</span>
            </div>
            <div className="actions-section" style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <label style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', fontSize: '0.78rem', color: 'var(--text-secondary)', cursor: 'pointer', border: '1px dashed var(--border-color)', padding: '0.4rem 0.6rem', borderRadius: '6px', backgroundColor: financeFilterActive ? '#EFF6FF' : 'transparent', borderColor: financeFilterActive ? '#93C5FD' : 'var(--border-color)', userSelect: 'none' }} title="Prioritize finance/fintech/VC matches and deprioritize unrelated industries (publishing, media, education, etc.). Shows industry snippets when names collide.">
                <input 
                  type="checkbox" 
                  checked={financeFilterActive}
                  onChange={(e) => setFinanceFilterActive(e.target.checked)}
                  style={{ cursor: 'pointer', margin: 0 }}
                />
                <span style={{ fontWeight: financeFilterActive ? '600' : '400', color: financeFilterActive ? '#1E40AF' : 'inherit' }}>
                  💼 Finance Search Filter
                </span>
              </label>
              <button className="btn" title="Configure simulation parameters" onClick={() => setShowSettings(true)}>
                <SlidersIcon size={15} />
                <span>Settings</span>
              </button>
              <button className="btn btn-danger" disabled={rows.length === 0} onClick={handleClearTable}>
                <TrashIcon size={15} />
                <span>Clear Table</span>
              </button>
              <div className="export-group">
                <button className="btn btn-primary" disabled={rows.length === 0} onClick={handleExportCSV} title="Export as CSV">
                  <DownloadIcon size={15} />
                  <span>CSV</span>
                </button>
                <button className="btn btn-primary" disabled={rows.length === 0} onClick={handleExportXLSX} title="Export as Excel (.xlsx)">
                  <DownloadIcon size={15} />
                  <span>XLSX</span>
                </button>
                <button className="btn btn-primary" disabled={rows.length === 0} onClick={handleExportPDF} title="Export as PDF table">
                  <DownloadIcon size={15} />
                  <span>PDF</span>
                </button>
              </div>
              <button className="btn" disabled={rows.length === 0} onClick={resetColumns} title="Reset column widths to defaults">
                <span style={{ fontSize: '0.75rem' }}>Reset Cols</span>
              </button>
            </div>
          </header>

          {/* Paste & Input Area */}
          <section className="input-section">
            <div className="input-header">
              <div>
                <h2 className="input-title">Batch Company List</h2>
                <span className="input-subtitle">Paste lists or load CSV sheets to begin domain resolution.</span>
              </div>
              <label className="file-upload-label">
                <UploadIcon size={14} />
                <span>Import TXT / CSV</span>
                <input 
                  type="file" 
                  ref={fileInputRef}
                  accept=".csv,.txt" 
                  className="file-upload-input" 
                  onChange={handleFileUpload} 
                />
              </label>
            </div>

            <div className="textarea-container">
              <textarea
                className="company-textarea"
                placeholder={"Paste person + company lines (tab-separated), e.g.\nLibby Cantrill – Managing Director\tPIMCO\nTom Cheesman – Partner\tStable"}
                value={inputText}
                onChange={(e) => setInputText(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter' && e.ctrlKey) {
                    handleParsePreview();
                  }
                }}
              />
            </div>

            <div className="input-controls">
              <span className="input-subtitle" style={{ fontStyle: 'italic' }}>
                Tip: Ctrl + Enter parses a preview first — correct companies, then confirm enrichment
              </span>
              <button className="btn btn-primary" onClick={handleParsePreview} disabled={!inputText.trim()}>
                <SearchIcon size={14} />
                <span>Parse & Preview</span>
              </button>
            </div>

            {parsePreview && (
              <div className="parse-preview">
                <div className="parse-preview-header">
                  <div>
                    <strong style={{ fontSize: '0.9rem' }}>Parse preview</strong>
                    <div className="input-subtitle">Edit Company if needed, then confirm to enrich. Contact/Source and Notes are kept.</div>
                  </div>
                  <div style={{ display: 'flex', gap: '0.4rem' }}>
                    <button className="btn" onClick={() => setParsePreview(null)}>Cancel</button>
                    <button className="btn btn-primary" onClick={handleConfirmEnrichment}>
                      <CheckIcon size={14} />
                      <span>Confirm & Enrich ({parsePreview.length})</span>
                    </button>
                  </div>
                </div>
                <div style={{ overflowX: 'auto', maxHeight: '280px' }}>
                  <table className="parse-preview-table">
                    <thead>
                      <tr>
                        <th style={{ width: '28%' }}>Company (editable)</th>
                        <th style={{ width: '28%' }}>Contact / Source</th>
                        <th style={{ width: '20%' }}>Notes</th>
                        <th>Original line</th>
                      </tr>
                    </thead>
                    <tbody>
                      {parsePreview.map(row => (
                        <tr key={row.id}>
                          <td>
                            <input
                              value={row.companyName}
                              onChange={(e) => updatePreviewRow(row.id, { companyName: e.target.value })}
                              placeholder="Company name"
                            />
                          </td>
                          <td>{row.sourceContact || '—'}</td>
                          <td>
                            <input
                              value={row.notes}
                              onChange={(e) => updatePreviewRow(row.id, { notes: e.target.value })}
                              placeholder="Notes"
                            />
                          </td>
                          <td><div className="parse-preview-raw" title={row.raw}>{row.raw}</div></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </section>

          {/* Stats Bar */}
          {rows.length > 0 && (
            <section className="stats-panel">
              <div className="stat-item">
                <span className="stat-label">Total Rows:</span>
                <span className="stat-value">{stats.total}</span>
              </div>
              <div className="stat-item">
                <span className="stat-label">Enriched:</span>
                <span className="stat-value" style={{ color: 'var(--success-text)' }}>{stats.found}</span>
              </div>
              <div className="stat-item">
                <span className="stat-label">Potential:</span>
                <span className="stat-value" style={{ color: '#D97706' }}>{stats.potential}</span>
              </div>
              <div className="stat-item">
                <span className="stat-label">Unverified:</span>
                <span className="stat-value" style={{ color: 'var(--error-text)' }}>{stats.unverified}</span>
              </div>
              <div className="stat-item">
                <span className="stat-label">Queue:</span>
                <span className="stat-value">{stats.pending + stats.searching}</span>
              </div>

              {(stats.pending > 0 || stats.searching > 0) && (
                <div className="stat-progress-bar-container">
                  <div className="stat-progress-track">
                    <div className="stat-progress-bar" style={{ width: `${progressPercent}%` }} />
                  </div>
                  <span className="stat-subtitle" style={{ minWidth: '30px' }}>{progressPercent}%</span>
                </div>
              )}
            </section>
          )}

          {/* Spreadsheet Table Grid */}
          <section className="table-workspace">
            {rows.length === 0 ? (
              <div className="empty-state">
                <div className="empty-state-icon">
                  <SearchIcon size={40} />
                </div>
                <h3 className="empty-state-title">Quiet Productivity Dashboard</h3>
                <p className="empty-state-subtitle">
                  Paste a list of company names (optionally split by dashes, bars, tabs, or spaces) to begin. Double-click headers to rename.
                </p>
              </div>
            ) : (
              <div className="table-wrapper">
                <div className="table-scroll-container">
                  <table className="spreadsheet-table">
                    <thead>
                      <tr>
                        <th className="col-status" style={{ width: colWidths['status'] || 118, minWidth: 100 }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>Status</span>
                            <div className="col-resizer" onMouseDown={(e) => startResize(e, 'status')} />
                          </div>
                        </th>
                        {headers.map(col => (
                          <th key={col.key} className={`col-${col.key}`} style={{ width: colWidths[col.key] || undefined, minWidth: 60 }}>
                            {editingHeader === col.key ? (
                              <input
                                ref={headerEditRef}
                                className="header-editor"
                                value={editingHeaderValue}
                                onChange={(e) => setEditingHeaderValue(e.target.value)}
                                onBlur={handleHeaderSave}
                                onKeyDown={handleHeaderKeyDown}
                              />
                            ) : (
                              <div
                                onDoubleClick={() => handleHeaderDoubleClick(col.key, col.label)}
                                title="Double-click header to rename · drag edge to resize"
                                style={{ cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                              >
                                <span>{col.label}</span>
                                <div className="col-resizer" onMouseDown={(e) => startResize(e, col.key)} />
                              </div>
                            )}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map((row) => {
                        const isRowProcessing = activeIds.includes(row.id);
                        
                        // Resolve dynamic headers
                        const compKey = getCompanyColumnKey();
                        const webKey = getWebsiteColumnKey();
                        const indKey = getIndustryColumnKey();
                        const hcKey = getHeadcountColumnKey();
                        const locKey = getLocationColumnKey();
                        const conKey = getContactsColumnKey();
                        const noteKey = getNotesColumnKey();

                        return (
                          <tr key={row.id} className="table-row">
                            {/* Status Badge */}
                            <td>
                              <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                                {row.status === 'pending' && (
                                  <span className="status-badge pending">
                                    <ClockIcon size={12} />
                                    <span>Pending</span>
                                  </span>
                                )}
                                {row.status === 'searching' && (
                                  <span className="status-badge searching">
                                    <LoaderIcon size={12} className="spinner" />
                                    <span>Searching...</span>
                                  </span>
                                )}
                                {row.status === 'verifying' && (
                                  <span className="status-badge pending" style={{ backgroundColor: '#FEF3C7', color: '#92400E', borderColor: '#FDE68A' }}>
                                    <LoaderIcon size={12} className="spinner" />
                                    <span>Verifying link...</span>
                                  </span>
                                )}
                                {row.status === 'enriching' && (
                                  <span className="status-badge searching">
                                    <LoaderIcon size={12} className="spinner" />
                                    <span>Enriching...</span>
                                  </span>
                                )}
                                {row.status === 'found' && (
                                  <span className="status-badge found">
                                    <CheckIcon size={12} />
                                    <span>Found</span>
                                  </span>
                                )}
                                {row.status === 'potential' && (
                                  <span className="status-badge pending" style={{ backgroundColor: '#FEF3C7', color: '#D97706', borderColor: '#FDE68A' }}>
                                    <AlertCircleIcon size={12} style={{ color: '#D97706' }} />
                                    <span>Potential Link</span>
                                  </span>
                                )}
                                {row.status === 'unverified' && (
                                  <span className="status-badge unverified" title={row[noteKey]}>
                                    <AlertCircleIcon size={12} />
                                    <span style={{ whiteSpace: 'normal', display: 'block', wordBreak: 'break-all' }}>Unverified</span>
                                  </span>
                                )}
                                
                                {!isRowProcessing && row.status !== 'pending' && (
                                  <button 
                                    className="btn" 
                                    style={{ padding: '0.15rem 0.3rem', fontSize: '0.7rem', borderRadius: '4px', height: 'auto', border: 'none', background: 'transparent' }}
                                    title="Re-run enrichment"
                                    onClick={() => triggerRowReRun(row.id)}
                                  >
                                    <RefreshIcon size={11} style={{ color: 'var(--text-secondary)' }} />
                                  </button>
                                )}
                              </div>
                            </td>

                            {/* Dynamic Columns mapping */}
                            {headers.map(col => {
                              const isCellEditing = editingCell?.id === row.id && editingCell?.column === col.key;
                              
                              return (
                                <td 
                                  key={col.key}
                                  className={`editable-cell ${col.key === webKey ? 'url-cell' : ''} ${col.key === noteKey ? 'notes-cell' : ''}`}
                                  onDoubleClick={() => handleCellDoubleClick(row.id, col.key, row[col.key])}
                                  title="Double-click to edit cell"
                                >
                                  {isCellEditing ? (
                                    <input
                                      ref={editInputRef}
                                      className={`cell-editor ${col.key === webKey ? 'mono' : ''}`}
                                      value={editingValue}
                                      onChange={(e) => setEditingValue(e.target.value)}
                                      onBlur={handleCellSave}
                                      onKeyDown={handleCellKeyDown}
                                    />
                                  ) : (
                                    // Custom renders depending on header mappings
                                    col.key === compKey ? (
                                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '100%' }}>
                                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                          {row[col.key] || <span style={{ color: 'var(--text-secondary)', fontStyle: 'italic' }}>[Empty]</span>}
                                        </span>
                                        {row[col.key] && row[col.key] !== '-' && (
                                          <a 
                                            href={`https://www.google.com/search?q=${encodeURIComponent(row[col.key])}`}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            title="Search Google"
                                            style={{ color: 'var(--text-secondary)', opacity: 0.6, display: 'inline-flex', alignSelf: 'center', marginLeft: '4px' }}
                                            onClick={(e) => e.stopPropagation()}
                                          >
                                            <SearchIcon size={11} />
                                          </a>
                                        )}
                                      </div>
                                    ) : col.key === webKey ? (
                                      row[col.key] && row[col.key] !== '-' ? (
                                        row.status === 'found' && row.linkVerified !== false ? (
                                          <a 
                                            href={row[col.key].startsWith('http') ? row[col.key] : `https://${row[col.key]}`} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="url-link"
                                            onClick={(e) => e.stopPropagation()}
                                            title="Verified website"
                                          >
                                            <span>{row[col.key]}</span>
                                            <ExternalLinkIcon size={10} />
                                          </a>
                                        ) : (
                                          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.1rem', maxWidth: '100%' }}>
                                            <span className="url-plain" title="Not verified — not shown as a clickable link">
                                              {row[col.key]}
                                            </span>
                                            <span style={{ fontSize: '0.68rem', color: '#D97706', fontStyle: 'italic' }}>
                                              {row.status === 'potential' ? 'Unverified candidate' : 'Unverified'}
                                            </span>
                                            {row.matchSnippet && (
                                              <span className="match-snippet" title={row.matchSnippet}>{row.matchSnippet}</span>
                                            )}
                                          </div>
                                        )
                                      ) : (
                                        <span style={{ color: 'var(--text-secondary)' }}>-</span>
                                      )
                                    ) : col.key === indKey ? (
                                      <div style={{ display: 'flex', flexDirection: 'column', maxWidth: '100%' }}>
                                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>{row[col.key] || '-'}</span>
                                        {row.matchSnippet && row.status === 'potential' && (
                                          <span className="match-snippet" title={row.matchSnippet}>{row.matchSnippet}</span>
                                        )}
                                      </div>
                                    ) : col.key === locKey ? (
                                      row[col.key] && row[col.key] !== '-' ? (
                                        <a 
                                          href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(row[col.key])}`} 
                                          target="_blank" 
                                          rel="noopener noreferrer"
                                          className="url-link"
                                          style={{ color: 'inherit' }}
                                          onClick={(e) => e.stopPropagation()}
                                        >
                                          <span>{row[col.key]}</span>
                                          <ExternalLinkIcon size={8} style={{ opacity: 0.5, marginLeft: '3px' }} />
                                        </a>
                                      ) : (
                                        '-'
                                      )
                                    ) : col.key === conKey ? (
                                      (() => {
                                        const founderVal = row[col.key] || '';
                                        const hasFounder = founderVal && founderVal !== '-' && founderVal !== 'Needs Manual Research' && founderVal !== 'Needs Verification';
                                        const searchQuery = hasFounder 
                                          ? `${row[compKey] || ''} ${founderVal}`
                                          : `${row[compKey] || ''} founder`;
                                        const displayVal = hasFounder ? founderVal : (founderVal || 'Needs Manual Research');
                                        return (
                                          <a 
                                            href={`https://www.google.com/search?q=${encodeURIComponent(searchQuery)}`} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="url-link"
                                            onClick={(e) => e.stopPropagation()}
                                            title={`Search Google for: "${searchQuery}"`}
                                          >
                                            <span>{displayVal}</span>
                                            <ExternalLinkIcon size={10} />
                                          </a>
                                        );
                                      })()
                                    ) : (
                                      row[col.key] || '-'
                                    )
                                  )}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {rows.length > 0 && (
              <div className="table-bottom-actions">
                <button className="btn-add-row" onClick={handleAddBlankRow}>
                  <PlusIcon size={12} />
                  <span>Add Empty Row</span>
                </button>
                <span style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>
                  Double-click cells or headers to edit. Renaming header keys (e.g. to "Company") will auto-remap AI search keys dynamically.
                </span>
              </div>
            )}
          </section>

          {/* Preferences Settings Modal */}
          {showSettings && (
            <div className="settings-modal-overlay">
              <div className="settings-modal">
                <div className="settings-header">
                  <h3 className="settings-title">Processing Preferences</h3>
                  <button className="settings-close" onClick={() => setShowSettings(false)}>
                    <XIcon size={18} />
                  </button>
                </div>
                
                <div className="form-group">
                  <label className="form-label">Simulation Processing Speed</label>
                  <select 
                    className="form-input" 
                    value={latencySpeed}
                    onChange={(e) => setLatencySpeed(e.target.value)}
                  >
                    <option value="calm">Calm & Restful (Slow latency)</option>
                    <option value="normal">Standard (Default network speed)</option>
                    <option value="fast">Speed Demon (Immediate replies)</option>
                  </select>
                  <p style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', marginTop: '0.2rem' }}>
                    Adjusts the artificial lag of the Base44 simulation calls to let you inspect cell transitions.
                  </p>
                </div>

                <div className="form-group" style={{ borderTop: '1px solid var(--border-color)', paddingTop: '0.75rem' }}>
                  <label className="form-label">Simulated AI Model Prompt</label>
                  <textarea 
                    className="form-input" 
                    style={{ fontSize: '0.8rem', resize: 'none', height: '60px', fontFamily: 'var(--font-mono)' }} 
                    readOnly
                    value='Find the official website domain for the company named [X]. Return only the domain.'
                  />
                </div>

                <button 
                  className="btn btn-primary" 
                  style={{ alignSelf: 'flex-end', marginTop: '0.5rem' }}
                  onClick={() => setShowSettings(false)}
                >
                  Save & Close
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Mount React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
