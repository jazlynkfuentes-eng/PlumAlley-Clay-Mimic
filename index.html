      background: var(--table-header-bg);

      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border-color);

      border-collapse: collapse;
      font-size: 0.8rem;

    .parse-preview-table th {
      text-align: left;

    }
    .parse-preview-table input {

      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 0.25rem 0.4rem;

      color: var(--text-secondary);
      font-size: 0.72rem;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }


    /* Table Header Styles */
    .spreadsheet-table th {
      position: sticky;
      top: 0;
      z-index: 10;
      background-color: var(--table-header-bg);
      border-bottom: 2px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      padding: 0.65rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: left;
      user-select: none;
      white-space: normal;

    .table-row {
      animation: fadeIn 0.3s ease-out;

    .table-row:nth-child(even) {
      background-color: var(--table-row-alt);
    }

    .table-row:hover {
      background-color: var(--accent-light) !important;
    }

    /* Cell Styles */
    .spreadsheet-table td {
      border-bottom: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      padding: 0.55rem 0.75rem;
      font-size: 0.85rem;
      color: var(--text-primary);
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
      word-break: break-word;
      position: relative;
      line-height: 1.4;
    }

    .spreadsheet-table td:last-child {
      border-right: none;
    }

    /* Clickable URLs */
    .url-cell {
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .url-link {
      color: var(--accent-color);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .url-link:hover {
      text-decoration: underline;
      color: var(--accent-hover);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      font-family: var(--font-sans);
    }

    .status-badge.searching {
      background-color: #EDF2F7;
      color: #2B6CB0;
      border: 1px solid #CBD5E0;
    }

    .status-badge.found {
      background-color: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);

    .status-badge.unverified {
      background-color: var(--error-bg);
      color: var(--error-text);

    .status-badge.pending {

    .spinner {

      height: 12px;

      border-top-color: #2B6CB0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;

    .editable-cell {

    }

      font-size: 1rem;

      color: var(--text-primary);

        white-space: nowrap;
      }
    }

    /**
     * Parse a pasted line that may mix "Person – Title" with a company name.
     * @returns {{ companyName: string, sourceContact: string, personName: string, personTitle: string, notes: string, raw: string }}
     */
    function parsePersonCompanyLine(rawLine) {
      const raw = String(rawLine || '').trim();
      if (!raw) return null;

      let left = raw;
      let right = '';

      // 1) Tab is most reliable separator between person/title and company
      if (raw.includes('\t')) {
        const tabIdx = raw.indexOf('\t');
        left = raw.slice(0, tabIdx).trim();
        right = raw.slice(tabIdx + 1).trim();
      } else {
        // 2) Split on last em/en dash, then check for large whitespace gap
        const dashChars = ['–', '—'];
        let splitAt = -1;
        for (const d of dashChars) {
          const idx = raw.lastIndexOf(d);
          if (idx > splitAt) splitAt = idx;
        }
        // Spaced hyphen as dash (avoid splitting hyphenated surnames like Robertsson-Rasheed)
        const spacedHyphen = raw.lastIndexOf(' - ');
        if (spacedHyphen > splitAt) splitAt = spacedHyphen;

        if (splitAt > 0) {
          const afterDash = raw.slice(splitAt).replace(/^[–—-]+\s*/, '');
          // If there's a large whitespace gap after the title area, company is after the gap
          const gapMatch = afterDash.match(/^(.+?)(?:\t|\s{2,})(.+)$/);
          if (gapMatch) {
            left = (raw.slice(0, splitAt) + ' – ' + gapMatch[1]).trim();
            right = gapMatch[2].trim();
          } else {
            // Fallback: title-word heuristic — company is tokens after the title phrase
            const titleMatch = raw.match(TITLE_PATTERN);
            if (titleMatch && titleMatch.index != null) {
              // Find end of title-ish clause, then remaining may be company if separated
              // Without tab, assume everything after last dash is title+maybe company mixed — weak
              left = raw.slice(0, splitAt).trim();
              right = afterDash.trim();
              // If "right" looks like a title (starts with title word), there may be no company
              if (TITLE_PATTERN.test(right) && right.split(/\s+/).length <= 8 && !/[A-Z][a-z]+(?:\s+[A-Z][a-z]+){0,3}$/.test(right)) {
                // entire line is person – title only
                left = raw;
                right = '';
              }
            } else {
              left = raw.slice(0, splitAt).trim();
              right = afterDash.trim();
            }
          }
        } else {
          // 3) Title-word heuristic with no dash
          const m = raw.match(TITLE_PATTERN);
          if (m && m.index != null && m.index > 2) {
            left = raw.slice(0, m.index).trim().replace(/[–—-]\s*$/, '').trim();
            const afterTitleStart = raw.slice(m.index);
            // Company often follows title after 2+ spaces or tab
            const gap = afterTitleStart.match(/^(.*?)(?:\t|\s{2,})(.+)$/);
            if (gap) {
              left = (left + ' – ' + gap[1]).trim();
              right = gap[2].trim();

        return { text: t, found };
      };

      // Multi-company: prefer / then ;
      let primaryCompany = companyPart;
      let alternates = [];
      if (companyPart.includes('/')) {
        const bits = companyPart.split('/').map(s => s.trim()).filter(Boolean);
        primaryCompany = bits[0] || '';
        alternates = bits.slice(1);
      } else if (companyPart.includes(';')) {
        const bits = companyPart.split(';').map(s => s.trim()).filter(Boolean);
        primaryCompany = bits[0] || '';
        alternates = bits.slice(1);
      }

      const primaryParsed = extractParens(primaryCompany);
      primaryCompany = primaryParsed.text;
      notes.push(...primaryParsed.found);

      alternates = alternates.map(a => {
        const p = extractParens(a);
        notes.push(...p.found);
        if (p.text) notes.push(`Also: ${p.text}`);
        return p.text;
      }).filter(Boolean);

      // If still no company, maybe the "title" was actually company (rare) — leave empty
      const sourceContact = [personName, personTitle].filter(Boolean).join(' – ');

      return {
        raw,
        companyName: primaryCompany || '',
        sourceContact: sourceContact || left || raw,
        personName: personName || '',
        personTitle: personTitle || '',
        notes: notes.filter(Boolean).join(' · '),
        alternates
      };
    }

    function isAmbiguousCompanyName(name) {
      const cleaned = String(name || '').trim();
      if (!cleaned) return true;
      const key = cleaned.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (KNOWN_UNAMBIGUOUS.has(key)) return false;
      // Short / acronym / alphanumeric brands
      if (key.length <= 8) return true;
      if (/^[a-z]{1,6}\d+[a-z]*$/i.test(key) || /\d/.test(key) && key.length <= 10) return true;
      // Single token under 12 chars without corp suffixes
      const tokens = cleaned.split(/\s+/).filter(Boolean);
      if (tokens.length === 1 && key.length < 12) return true;
      return false;
    }

    function isNonEntityCompany(name) {
      const n = String(name || '').trim();
      if (!n) return true;
      if (/^private fund$/i.test(n)) return true;
      if (/^(n\/?a|none|null|tbd|placeholder)$/i.test(n)) return true;
      return false;
    }

    async function resolveDomain(companyName, financeFilterActive = false, skippedDomains = [], personContext = null) {
      // Fast path / unambiguous companies: never spend person-context search budget
      const skipPerson = isKnownUnambiguousCompany(companyName) || !isAmbiguousCompanyName(companyName);
      const effectivePerson = skipPerson ? null : personContext;

      const cacheKey = makeResolveCacheKey(companyName, financeFilterActive, skippedDomains, effectivePerson);
      if (resolveCache.has(cacheKey)) {
        const cached = resolveCache.get(cacheKey);
        console.log('[resolve] CACHE HIT', companyName, '->', cached?.domain || null);
        return cached ? { ...cached, fromCache: true } : null;
      }

      const store = (result) => {
        resolveCache.set(cacheKey, result);
        return result;
      };

      // No artificial latency on the hot path — real network time is enough
      if (!companyName || companyName.trim().length < 2) {
        return store(null);
      }

      // Internal labels / non-entity rows — skip search entirely
      if (isNonEntityCompany(companyName) || /\(\s*moderator\s*\)/i.test(companyName)) {
        console.log('[resolve] skipping non-entity label:', companyName);
        return store(null);
      }

      // Check if we are running from a local server to execute real-time backend scrapers
      const isLocalServer = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port === '8081';
      if (isLocalServer) {
        try {
          const skipParam = (skippedDomains || []).join(',');
          const response = await fetch(`/api/enrich?name=${encodeURIComponent(companyName)}&skip=${encodeURIComponent(skipParam)}`);
          if (response.ok) {
            const data = await response.json();
            if (data && !data.error && data.domain) {
              return { 
                domain: data.domain, 
                isUnsure: data.isUnsure,
                apiData: data
              };
            }
          }
        } catch (e) {
          console.error("Local enrichment API failed, falling back to local waterfall...", e);
        }
      }

      // Advanced query cleaning helper
      const getCleanedQuery = (name) => {
        return name
          .trim()
          .toLowerCase()
          .replace(/[,.]?\s*\b(inc|llc|co|corp|corporation|ltd|limited|gmbh|sa|as|ab|oy|bv|nv|pvt|plc|holdings|group|associates|global|international|advisors|management|consulting|services|solutions|systems|technologies|networks|labs|digital|media|design|creative|agency|studio|studios|collective|cooperative|coop|ventures|ventures\s+capital|capital|partners)\b/gi, "")
          .replace(/^the\s+/i, "")
          .replace(/\bcompany\b$/i, "")
          .replace(/\s+/g, " ")
          .trim();
      };

      let cleaned = getCleanedQuery(companyName);
      const baseCleaned = cleaned; // preserve pre-finance-augmented name for scoring

      // Waterfall Tier 0: Direct Catalogue Lookup (Ensures offline dictionary items resolve instantly)
      const localClean = cleaned.replace(/[^a-z0-9]/g, '');
      const rawKey = companyName.trim().toLowerCase();
      if (companyDictionary[rawKey]) {
        const d = companyDictionary[rawKey].domain.toLowerCase();
        if (!skippedDomains.includes(d)) {
          console.log('[resolve] FAST PATH dictionary', companyName, '->', d);
          return store({ domain: d, isUnsure: false, industrySnippet: companyDictionary[rawKey].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }
      if (companyDictionary[localClean]) {
        const d = companyDictionary[localClean].domain.toLowerCase();
        if (!skippedDomains.includes(d)) {
          console.log('[resolve] FAST PATH dictionary', companyName, '->', d);
          return store({ domain: d, isUnsure: false, industrySnippet: companyDictionary[localClean].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }
      for (const key in companyDictionary) {
        const d = companyDictionary[key].domain.toLowerCase();
        const keyNorm = key.replace(/[^a-z0-9]/g, '');
        if ((localClean === keyNorm || rawKey === key || localClean.includes(keyNorm) || keyNorm.includes(localClean)) && !skippedDomains.includes(d)) {
          // Avoid ultra-short accidental partials
          if (Math.min(localClean.length, keyNorm.length) < 4 && localClean !== keyNorm) continue;
          console.log('[resolve] FAST PATH dictionary fuzzy', companyName, '->', d);
          return store({ domain: d, isUnsure: false, industrySnippet: companyDictionary[key].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }

      // Finance Search Filter: augment SEARCH query only — never mutate the scoring key
      let searchQuery = cleaned;
      if (financeFilterActive) {
        const financeTerms = ["capital", "partners", "ventures", "investment", "holdings", "wealth", "finance", "fund", "equity", "management", "pe", "vc", "advisory", "advisors", "associates", "group", "fintech", "bank"];
        const hasFinanceTerm = financeTerms.some(term => cleaned.toLowerCase().includes(term));
        if (!hasFinanceTerm) {
          searchQuery = `${cleaned} capital`;
        }
      }

      const FINANCE_KW = ["capital", "partner", "venture", "investment", "fund", "holding", "wealth", "finance", "equity", "fintech", "bank", "asset", "credit", "lend", "hedge", "private equity", "pe ", " vc", "advisory", "advisors", "securities", "broker"];
      const NON_FINANCE_KW = ["museum", "foundation", "association", "school", "university", "college", "charity", "arts", "cultural", "publishing", "publisher", "reading", "reader", "bookstore", "book", "magazine", "newspaper", "media", "blog", "podcast", "restaurant", "cafe", "coffee", "retail", "apparel", "fashion", "gaming", "game", "studio", "film", "music", "hotel", "travel", "clinic", "hospital", "church", "nonprofit", "ngo"];

      const inferSnippet = (item) => {
        const name = (item.name || '').trim();
        const domain = (item.domain || '').toLowerCase();
        const blob = `${name} ${domain}`.toLowerCase();
        if (FINANCE_KW.some(k => blob.includes(k.trim()))) return name ? `${name} · finance` : 'finance-related';
        if (NON_FINANCE_KW.some(k => blob.includes(k))) {
          const hit = NON_FINANCE_KW.find(k => blob.includes(k));
          return name ? `${name} · ${hit}` : hit;
        }
        return name || domain;
      };

      // Best match scorer — returns rich match object for disambiguation
      // scoreAgainst: brand name used for domain/name similarity (NOT finance-augmented)
      const findBestDomainMatch = (suggestions, scoreAgainst) => {
        if (!suggestions || suggestions.length === 0) return null;
        const cleanQuery = scoreAgainst.toLowerCase().replace(/[^a-z0-9]/g, '');
        const rawLower = scoreAgainst.toLowerCase().trim();
        if (!cleanQuery) {
          const first = suggestions[0];
          return { domain: first.domain, name: first.name || '', score: 0, snippet: inferSnippet(first), ambiguous: true, alternatives: [] };
        }

        const commonTlds = ['com', 'co', 'io', 'net', 'org', 'edu', 'gov', 'ai', 'me', 'us', 'ca', 'uk'];
        const scored = [];

        for (const item of suggestions) {
          if (!item.domain) continue;
          if (skippedDomains.includes(item.domain.toLowerCase())) continue;
          const parts = item.domain.toLowerCase().split('.');
          const domBase = parts[0].replace(/[^a-z0-9]/g, '');
          const tld = parts[parts.length - 1];
          const nameLower = (item.name || '').toLowerCase();
          const blob = `${nameLower} ${domBase}`;
          
          let score = 0;
          // Exact Clearbit brand name match is the strongest signal
          if (nameLower === rawLower || nameLower.replace(/[^a-z0-9]/g, '') === cleanQuery) {
            score += 150;
          }
          if (domBase === cleanQuery) {
            score += 100;
          } else if (cleanQuery.includes(domBase) || domBase.includes(cleanQuery)) {
            score += 50;
            score -= Math.abs(domBase.length - cleanQuery.length);
          } else {
            const tokens = scoreAgainst.toLowerCase().split(/\s+/).filter(t => t.length > 2);
            const hits = tokens.filter(t => nameLower.includes(t) || domBase.includes(t.replace(/[^a-z0-9]/g, '')));
            if (hits.length === 0) continue;
            score += hits.length * 20;
          }

          if (commonTlds.includes(tld)) score += 20;
          else score -= 60;
          
          if (financeFilterActive) {
            const hasFinanceKeywords = FINANCE_KW.some(k => blob.includes(k.trim()));
            const hasNonFinanceKeywords = NON_FINANCE_KW.some(k => blob.includes(k));
            
            if (hasFinanceKeywords) score += 120;
            if (hasNonFinanceKeywords) score -= 180;
          }

          scored.push({
            domain: item.domain.toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0],
            name: item.name || '',
            score,
            snippet: inferSnippet(item),
            isFinance: FINANCE_KW.some(k => blob.includes(k.trim())),
            isNonFinance: NON_FINANCE_KW.some(k => blob.includes(k)),
            exactName: nameLower === rawLower || nameLower.replace(/[^a-z0-9]/g, '') === cleanQuery
          });
        }

        if (scored.length === 0) return null;
        scored.sort((a, b) => b.score - a.score);

        let best = scored[0];
        if (financeFilterActive && scored.length > 1) {
          const financeCandidate = scored.find(s => s.isFinance && !s.isNonFinance);
          const top = scored[0];
          if (financeCandidate && top.isNonFinance && financeCandidate.score >= top.score - 40) {
            best = financeCandidate;
          } else if (financeCandidate && !top.isFinance && financeCandidate.score >= top.score - 25) {
            best = financeCandidate;
          }
        }

        // Prefer exact brand-name Clearbit hit even if finance scoring shuffled order
        const exact = scored.find(s => s.exactName);
        if (exact && exact.score >= best.score - 30) best = exact;

        const runnerUp = scored.find(s => s.domain !== best.domain);
        const ambiguous = !!(
          runnerUp &&
          !best.exactName &&
          Math.abs(best.score - runnerUp.score) < 25 &&
          runnerUp.score > 30
        );
        const alternatives = scored.slice(0, 3).map(s => s.snippet).filter(Boolean);

        if (financeFilterActive && best.isNonFinance && !best.isFinance) {
          const financeAlt = scored.find(s => s.isFinance);
          if (financeAlt) {
            best = financeAlt;
          } else if (best.score < 80 && !best.exactName) {
            return {
              domain: best.domain,
              name: best.name,
              score: best.score,
              snippet: best.snippet,
              ambiguous: true,
              alternatives,
              deprioritized: true
            };
          }
        }

        return {
          domain: best.domain,
          name: best.name,
          score: best.score,
          snippet: best.snippet,
          ambiguous,
          alternatives,
          exactName: !!best.exactName
        };
      };

      // Helper to clean DuckDuckGo Infobox value links (e.g. "[https://zoom.us Official site]" -> "zoom.us")
      const extractUrlDomain = (str) => {
        if (!str) return '';
        // Match brackets first: [https://example.com Link text]
        const bracketMatch = str.match(/\[\s*(https?:\/\/[^\s\]]+)/i);
        let url = bracketMatch ? bracketMatch[1] : str;
        
        // Find general URL structure
        const urlMatch = url.match(/(https?:\/\/[^\s\/]+)/i);
        if (urlMatch) {
          url = urlMatch[1];
        }
        
        return url.toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
      };

      // Waterfall Tier 1: Clearbit suggest API (+ optional person-context disambiguation)
      const toResolveResult = (match, method = 'name-only') => {
        if (!match || !match.domain) return null;
        const isUnsure = !!(match.ambiguous || match.deprioritized) && !match.exactName && match.score < 120;
        return {
          domain: match.domain,
          isUnsure,
          matchedName: match.name,
          industrySnippet: match.snippet,
          alternatives: match.alternatives || [],
          resolveMethod: method
        };
      };

      const tryClearbitQueries = async (queries, scoreAgainst, method) => {
        let weak = null;
        for (const q of queries) {
          if (!q || !String(q).trim()) continue;
          try {
            const response = await fetch(`https://autocomplete.clearbit.com/v1/companies/suggest?query=${encodeURIComponent(q)}`);
            const data = await response.json();
            if (data && data.length > 0) {
              const match = findBestDomainMatch(data, scoreAgainst || baseCleaned || companyName);
              const resolved = toResolveResult(match, method);
              if (resolved && (!resolved.isUnsure || match.exactName || match.score >= 100)) {
                console.log('[resolve] Clearbit hit via', method, q, '->', resolved.domain);
                return resolved;
              }
              if (resolved && !weak) weak = resolved;
            }
          } catch (err) {
            console.warn('Clearbit query failed', q, err);
          }
        }
        return weak;
      };

      try {
        const nameOnlyQueries = [searchQuery, baseCleaned || companyName, companyName];
        let nameHit = await tryClearbitQueries(nameOnlyQueries, baseCleaned || companyName, 'name-only');

        const usePerson = effectivePerson && (effectivePerson.personName || effectivePerson.personTitle)
          && (isAmbiguousCompanyName(companyName) || (nameHit && nameHit.isUnsure) || !nameHit);

        if (usePerson) {
          const pName = effectivePerson.personName || '';
          const pTitle = effectivePerson.personTitle || '';
          const personQueries = [
            `${companyName} ${pName}`.trim(),
            `${pName} ${pTitle} ${companyName}`.trim(),
            `${pName} ${companyName} capital`.trim(),
            `${companyName} ${pTitle}`.trim()
          ].filter((q, i, arr) => q && arr.indexOf(q) === i);

          console.log('[resolve] person-context search for', companyName, '→', personQueries[0]);
          const personHit = await tryClearbitQueries(personQueries, baseCleaned || companyName, 'name+person');
          if (personHit && (!personHit.isUnsure || !nameHit || nameHit.isUnsure)) {
            return store({
              ...personHit,
              resolveMethod: 'name+person',
              industrySnippet: `${personHit.industrySnippet || personHit.matchedName || companyName}${pName ? ' · via ' + pName : ''}`
            });
          }
        }

        if (nameHit) {
          const fast = isKnownUnambiguousCompany(companyName) || (!nameHit.isUnsure && !isAmbiguousCompanyName(companyName));
          return store({ ...nameHit, fastPath: !!fast });
        }
      } catch (err) {
        console.warn("Clearbit suggest query failed, continuing waterfall:", err);
      }

      // Waterfall Tier 2: DuckDuckGo Instant Answer API (checks Wikipedia/Wikidata Infoboxes)
      try {
        // Query base cleaned first (not finance-augmented)
        let response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(baseCleaned)}&format=json&no_html=1`);
        let json = await response.json();
        
        let item = null;
        if (json.Infobox && json.Infobox.content) {
          item = json.Infobox.content.find(i => i.data_type === 'official_website' || i.label === 'Official Website');
          if (!item) {
            item = json.Infobox.content.find(i => i.label === 'Website');
          }
        }

        if (!item && companyName.toLowerCase().trim() !== baseCleaned) {
          response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(companyName)}&format=json&no_html=1`);
          json = await response.json();
          if (json.Infobox && json.Infobox.content) {
            item = json.Infobox.content.find(i => i.data_type === 'official_website' || i.label === 'Official Website');
            if (!item) {
              item = json.Infobox.content.find(i => i.label === 'Website');
            }
          }
        }

        // Org / government / foundation: try "official site" Instant Answer
        const looksLikeOrg = /\b(office of|university|foundation|comptroller|ministry|department of|city of|county of|state of|government|authority|board of|commission)\b/i.test(companyName);
        if (!item && looksLikeOrg) {
          response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(companyName + ' official website')}&format=json&no_html=1`);
          json = await response.json();
          if (json.Infobox && json.Infobox.content) {
            item = json.Infobox.content.find(i => i.data_type === 'official_website' || i.label === 'Official Website' || i.label === 'Website');
          }
          if (!item && json.AbstractURL) {
            const absDom = extractUrlDomain(json.AbstractURL);
            if (absDom && absDom.includes('.') && !absDom.includes('wikipedia.org')) {
              return store({
                domain: absDom,
                isUnsure: false,
                matchedName: json.Heading || companyName,
                industrySnippet: (json.Heading || companyName) + (json.AbstractText ? ` — ${json.AbstractText.slice(0, 80)}` : ''),
                alternatives: [],
                resolveMethod: 'name-only'
              });
            }
          }
        }

        if (item && item.value) {
          const domain = extractUrlDomain(item.value);
          if (domain && domain.includes('.')) {
            const snippet = (json.Heading || baseCleaned) + (json.AbstractText ? ` — ${json.AbstractText.slice(0, 80)}` : '');
            return store({
              domain,
              isUnsure: false,
              matchedName: json.Heading || companyName,
              industrySnippet: snippet,
              alternatives: [],
              resolveMethod: 'name-only'
            });
          }
        }
      } catch (err) {
        console.warn("DuckDuckGo Instant Answer request failed:", err);
      }

      // Waterfall Tier 3: Local Dictionaries
      if (companyDictionary[localClean]) {
        return store({ domain: companyDictionary[localClean].domain, isUnsure: false, industrySnippet: companyDictionary[localClean].industry, resolveMethod: 'name-only', fastPath: true });
      }

      for (const key in companyDictionary) {
        if (localClean.includes(key) || key.includes(localClean)) {
          return store({ domain: companyDictionary[key].domain, isUnsure: false, industrySnippet: companyDictionary[key].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }

      // Block unverified test keys — and never invent domains (hallucination risk)
      if (["test", "asdf", "company", "xyz", "hello", "unknown"].includes(localClean)) {
        return store(null);
      }

      // Waterfall Tier 4: Wikipedia / Wikimedia for orgs, foundations, universities, government
      try {
        const orgVariants = [];
        const pushQ = (q) => {
          const t = String(q || '').trim();
          if (t && !orgVariants.some(x => x.toLowerCase() === t.toLowerCase())) orgVariants.push(t);
        };
        pushQ(companyName);
        pushQ(`${companyName} official website`);
        pushQ(baseCleaned);
        // Strip common org prefixes/suffixes for better Wikipedia hits
        pushQ(companyName.replace(/^office of\s+/i, '').trim());
        pushQ(companyName.replace(/\s*\(([^)]*)\)\s*/g, ' ').trim()); // drop (Moderator) etc.
        pushQ(companyName.replace(/\b(foundation|endowment|trust)\b/gi, '').replace(/\s+/g, ' ').trim());
        pushQ(companyName.replace(/\b(university)\s+foundation\b/i, 'university').trim());

        for (const wq of orgVariants) {
          if (!wq || wq.length < 3) continue;
          const openRes = await fetch(
            `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(wq)}&limit=5&namespace=0&format=json&origin=*`
          );
          if (!openRes.ok) continue;
          const openJson = await openRes.json();
          const titles = openJson[1] || [];
          if (!titles.length) continue;

          // Prefer a title that shares tokens with the query
          const qTokens = wq.toLowerCase().split(/\s+/).filter(t => t.length > 2);
          let bestIdx = 0;
          let bestScore = -1;
          titles.forEach((t, idx) => {
            const tl = t.toLowerCase();
            let s = qTokens.filter(tok => tl.includes(tok)).length * 10;
            if (tl === wq.toLowerCase()) s += 50;
            if (s > bestScore) { bestScore = s; bestIdx = idx; }
          });

          if (bestScore < 10 && qTokens.length > 1) continue;

          const title = titles[bestIdx];
          const wikiTitle = title;
          const wdRes = await fetch(
            `https://www.wikidata.org/w/api.php?action=wbgetentities&sites=enwiki&titles=${encodeURIComponent(wikiTitle)}&props=claims|descriptions&languages=en&format=json&origin=*`
          );
          if (!wdRes.ok) continue;
          const wd = await wdRes.json();
          const entities = wd.entities || {};
          const entity = Object.values(entities).find(e => e && e.claims && e.claims.P856);
          const claim = entity?.claims?.P856?.[0]?.mainsnak?.datavalue?.value;
          const domain = claim ? extractUrlDomain(claim) : '';
          const description = entity?.descriptions?.en?.value || '';

          if (domain && domain.includes('.') && !domain.includes('wikipedia.org')) {
            console.log('[resolve] Wikipedia/Wikidata official site', companyName, '->', domain, '(via', wq, ')');
            return store({
              domain,
              isUnsure: false,
              matchedName: wikiTitle,
              industrySnippet: `${wikiTitle}${description ? ' · ' + description : ''}`,
              alternatives: titles.slice(0, 3),
              resolveMethod: 'name-only'
            });
          }
        }
      } catch (err) {
        console.warn('Wikipedia org fallback failed:', err);
      }

      // No confident search hit — do not algorithmically guess a URL
      return store(null);
    }

    async function enrichCompanyDetails(domain, originalName, apiData = null) {
      const enrichKey = `${String(domain || '').toLowerCase()}|${String(originalName || '').trim().toLowerCase()}`;
      if (enrichCache.has(enrichKey)) {
        console.log('[enrich] CACHE HIT', domain);
        return { ...enrichCache.get(enrichKey), fromCache: true };
      }

      // Skip artificial latency — dictionary/heuristic returns are already instant
      const cleaned = cleanName(originalName);

      if (apiData) {
        const result = {
          industry: apiData.industry || "Technology",
          headcount: apiData.headcount || "11 - 50",
          location: apiData.location || "San Francisco, CA",
          notes: apiData.notes || "Verified via real-time search lookup.",
          contacts: apiData.founder || "Needs Manual Research",
          gender: apiData.gender || "Needs Verification"
        };
        enrichCache.set(enrichKey, result);
        return result;
      }

      const getContactAndGender = (compName) => {
        const dict = {
          "google": { name: "Sundar Pichai (CEO)", gender: "Male" },
          "apple": { name: "Tim Cook (CEO)", gender: "Male" },
          "microsoft": { name: "Satya Nadella (CEO)", gender: "Male" },
          "notion": { name: "Ivan Zhao (Founder)", gender: "Male" },
          "stripe": { name: "Patrick Collison (CEO)", gender: "Male" },
          "openai": { name: "Sam Altman (CEO)", gender: "Male" },
          "linkedin": { name: "Ryan Roslansky (CEO)", gender: "Male" },

          const newWidth = Math.max(startWidth + delta, 60);
          setColWidths((prev) => ({ ...prev, [key]: newWidth }));
        };
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);

      const handleHeaderKeyDown = (e) => {

          handleHeaderSave();
