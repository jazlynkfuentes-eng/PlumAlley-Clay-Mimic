    function scoreWikidataProminence(entity, title, description) {
      let score = 0;
      const reasons = [];
      const employees = claimAmount(entity, 'P1128');
      if (employees != null && !Number.isNaN(employees)) {
        if (employees >= 10000) { score += 80; reasons.push(`${employees}+ employees`); }
        else if (employees >= 1000) { score += 55; reasons.push(`${employees} employees`); }
        else if (employees >= 200) { score += 30; reasons.push(`${employees} employees`); }
        else if (employees >= 50) { score += 10; reasons.push(`${employees} employees`); }
      }
      const founded = claimYear(entity, 'P571');
      if (founded != null) {
        if (founded <= 1950) { score += 35; reasons.push(`founded ${founded}`); }
        else if (founded <= 1985) { score += 25; reasons.push(`founded ${founded}`); }
        else if (founded <= 2005) { score += 12; reasons.push(`founded ${founded}`); }
      }
      const desc = String(description || entity?.descriptions?.en?.value || '').toLowerCase();
      if (/\b(largest|global|fortune|multinational|ivy league|flagship)\b/.test(desc)) {
        score += 25;
        reasons.push('notable description');
      }
      if (title && /\b(group|inc\.?|corporation|university|college|foundation)\b/i.test(title)) {
        score += 8;
      }
      // Having an official website claim is a weak notability signal
      if (claimOfficialDomain(entity)) score += 5;
      return { score, employees, founded, reasons, description: desc };
    }

    async function fetchWikidataEntitiesForName(companyName, cleanedName) {
      const queries = [companyName, cleanedName, `${companyName} company`, `${companyName} (company)`]
        .map(q => String(q || '').trim())
        .filter((q, i, arr) => q && q.length >= 2 && arr.indexOf(q) === i);

      const results = [];
      for (const wq of queries.slice(0, 3)) {
        try {
          const openRes = await fetch(
            `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(wq)}&limit=6&namespace=0&format=json&origin=*`
          );
          if (!openRes.ok) continue;
          const openJson = await openRes.json();
          const titles = openJson[1] || [];
          if (!titles.length) continue;

          const qTokens = wq.toLowerCase().split(/\s+/).filter(t => t.length > 2);
          const ranked = titles.map((t) => {
            const tl = t.toLowerCase();
            let s = qTokens.filter(tok => tl.includes(tok)).length * 12;
            if (tl === wq.toLowerCase()) s += 50;
            if (/\b(company|group|inc|corporation|university|college|foundation|partners|capital)\b/i.test(t)) s += 10;
            // Deprioritize disambiguation / film / music noise
            if (/\(disambiguation\)|\balbum\b|\bfilm\b|\bsong\b/i.test(t)) s -= 40;
            return { title: t, titleScore: s };
          }).filter(x => x.titleScore >= 8).sort((a, b) => b.titleScore - a.titleScore);

          for (const { title, titleScore } of ranked.slice(0, 3)) {
            const wdRes = await fetch(
              `https://www.wikidata.org/w/api.php?action=wbgetentities&sites=enwiki&titles=${encodeURIComponent(title)}&props=claims|descriptions|labels&languages=en&format=json&origin=*`
            );
            if (!wdRes.ok) continue;
            const wd = await wdRes.json();
            const entity = Object.values(wd.entities || {}).find(e => e && e.claims && !e.missing);
            if (!entity) continue;
            const description = entity?.descriptions?.en?.value || '';
            const domain = claimOfficialDomain(entity);
            const prominence = scoreWikidataProminence(entity, title, description);
            const instanceIds = claimInstanceIds(entity);
            results.push({
              title,
              titleScore,
              domain,
              description,
              entity,
              instanceIds,
              prominenceScore: prominence.score,
              prominenceReasons: prominence.reasons,
              employees: prominence.employees,
              founded: prominence.founded
            });
          }
          if (results.length) break;
        } catch (e) {
          console.warn('[wikidata] lookup failed', wq, e);
        }
      }
      // Dedupe by domain/title
      const seen = new Set();
      return results.filter(r => {
        const k = `${r.domain}|${r.title}`;
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
      });
    }

    /**
     * Prominence disambiguation for ANY company name with multiple plausible domains.
     * Prefer a clearly larger/more notable Wikidata entity's official site; if two are
     * similarly prominent, mark ambiguous (Potential) instead of guessing.
     */
    async function crossCheckProminentDomain(companyName, candidateDomain, cleanedName, clearbitAlternatives = []) {
      const major = lookupMajorKnownFirm(companyName);
      const cand = String(candidateDomain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
      if (major) {
        if (cand === major.domain) return null;
        return {
          action: 'override',
          domain: major.domain,
          label: major.label,
          snippet: `${major.label} · ${major.industry} (canonical)`,
          alternatives: [cand, major.domain].filter(Boolean)
        };
      }

      const key = companyKeyNorm(companyName);
      if (!key || key.length < 2) return null;

      const wikiHits = await fetchWikidataEntitiesForName(companyName, cleanedName);
      const withDomain = wikiHits.filter(h => h.domain && h.domain.includes('.') && !h.domain.includes('wikipedia.org'));
      const prominent = withDomain
        .filter(h => h.prominenceScore >= 25 || h.employees >= 200 || (h.founded && h.founded <= 1995))
        .sort((a, b) => b.prominenceScore - a.prominenceScore);

      const candBase = cand.split('.')[0].replace(/[^a-z0-9]/g, '');
      const bestWiki = prominent[0] || withDomain.sort((a, b) => b.prominenceScore - a.prominenceScore)[0];

      if (bestWiki) {
        const wikiBase = bestWiki.domain.split('.')[0].replace(/[^a-z0-9]/g, '');
        const wikiIsProminent = bestWiki.prominenceScore >= 25 || (bestWiki.employees != null && bestWiki.employees >= 200);

        // Candidate is a longer compound of the brand (blackstonecap) while wiki has exact apex
        if (
          wikiIsProminent &&
          bestWiki.domain !== cand &&
          wikiBase === key &&
          candBase !== key &&
          candBase.includes(key)
        ) {
          console.log('[resolve] prominence override (compound→canonical)', companyName, cand, '->', bestWiki.domain, bestWiki.prominenceReasons);
          return {
            action: 'override',
            domain: bestWiki.domain,
            label: bestWiki.title,
            snippet: `${bestWiki.title} · ${bestWiki.description || 'Wikipedia'} (${bestWiki.prominenceReasons.join(', ') || 'notable'})`,
            alternatives: [cand, bestWiki.domain]
          };
        }

        // Wiki official site differs and is clearly more prominent than a weak Clearbit pick
        if (wikiIsProminent && bestWiki.domain !== cand && (wikiBase === key || bestWiki.prominenceScore >= 40)) {
          // If Clearbit also suggested the wiki domain, strongly prefer it
          const altDomains = (clearbitAlternatives || []).map(a => String(a).toLowerCase());
          const clearbitHadWiki = altDomains.some(d => d === bestWiki.domain || d.startsWith(wikiBase + '.'));
          if (clearbitHadWiki || wikiBase === key || bestWiki.prominenceScore >= 50) {
            console.log('[resolve] prominence override', companyName, cand, '->', bestWiki.domain);
            return {
              action: 'override',
              domain: bestWiki.domain,
              label: bestWiki.title,
              snippet: `${bestWiki.title} · Wikidata prominence`,
              alternatives: [cand, bestWiki.domain, ...altDomains].filter(Boolean).slice(0, 4)
            };
          }
        }

        // Two wiki hits similarly prominent with different domains → ambiguous
        if (prominent.length >= 2 && prominent[0].domain !== prominent[1].domain) {
          const gap = prominent[0].prominenceScore - prominent[1].prominenceScore;
          if (gap < 20) {
            return {
              action: 'ambiguous',
              domain: prominent[0].domain,
              label: prominent[0].title,
              alternatives: prominent.slice(0, 3).map(p => p.domain)
            };
          }
        }
      }

      // Clearbit-only ambiguity: multiple distinct domains returned for same name
      const uniqAlts = [...new Set((clearbitAlternatives || []).map(d => String(d || '').toLowerCase()).filter(Boolean))];
      if (uniqAlts.length >= 2) {
        const apexMatches = uniqAlts.filter(d => d.split('.')[0].replace(/[^a-z0-9]/g, '') === key);
        const compounds = uniqAlts.filter(d => {
          const b = d.split('.')[0].replace(/[^a-z0-9]/g, '');
          return b !== key && b.includes(key);
        });
        if (apexMatches.length === 1 && compounds.length >= 1) {
          if (cand !== apexMatches[0]) {
            return {
              action: 'override',
              domain: apexMatches[0],
              label: companyName,
              snippet: `${companyName} · preferred exact domain over lookalikes`,
              alternatives: uniqAlts.slice(0, 4)
            };
          }
        }
        // No exact apex among Clearbit hits (common for short/acronym names) → Potential, don't guess
        if (apexMatches.length === 0) {
          return {
            action: 'ambiguous',
            domain: cand,
            label: companyName,
            alternatives: uniqAlts.slice(0, 4)
          };
        }
      }

      return null;
    }

    /**
     * Sector from entity type — wins over free-text keyword scraping.
     * Sync signals: TLD + name patterns. Async Wikidata fills gaps.
     */
    function inferEntityTypeIndustry(companyName, domain) {
      const host = String(domain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
      const name = String(companyName || '').trim();
      const blob = `${name} ${host}`.toLowerCase();

      // Foundations / nonprofits first — "West Virginia University Foundation" is a foundation, not a university
      if (/\b(foundation|non-?profit|nonprofit|charity|ngo|church|temple|mosque|synagogue|parish|congregation)\b/i.test(blob)) {
        return 'Nonprofit / Foundation';
      }
      if (/\.edu$/i.test(host) || /\b(university|college|polytechnic|school|academy|institute of technology)\b/i.test(name)) {
        return 'Education';
      }
      if (/\.gov$/i.test(host) || /\b(department of|ministry of|city of|county of|state of|government|municipal|agency|authority|commission|office of the|comptroller)\b/i.test(name)) {
        return 'Government';
      }
      return null;
    }

    function industryFromWikidataInstances(instanceIds, companyName, domain) {
      if (!instanceIds || !instanceIds.length) return null;
      if (instanceIds.some(id => WD_EDUCATION.has(id))) return 'Education';
      if (instanceIds.some(id => WD_GOVERNMENT.has(id))) return 'Government';
      if (instanceIds.some(id => WD_NONPROFIT_STRONG.has(id))) return 'Nonprofit / Foundation';
      // Weak org type + name/domain hints
      if (instanceIds.some(id => WD_NONPROFIT.has(id)) && inferEntityTypeIndustry(companyName, domain)) {
        return inferEntityTypeIndustry(companyName, domain);
      }
      return null;
    }

    async function lookupWikidataEntityType(companyName, domain) {
      const sync = inferEntityTypeIndustry(companyName, domain);
      if (sync) return { industry: sync, source: 'name-or-tld' };

      try {
        const hits = await fetchWikidataEntitiesForName(companyName, companyName);
        const host = String(domain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
        // Prefer the hit whose official domain matches what we resolved
        const ordered = [...hits].sort((a, b) => {
          const aMatch = a.domain && host && a.domain === host ? 1 : 0;
          const bMatch = b.domain && host && b.domain === host ? 1 : 0;
          return bMatch - aMatch || b.prominenceScore - a.prominenceScore;
        });
        for (const hit of ordered) {
          const fromP31 = industryFromWikidataInstances(hit.instanceIds, companyName, domain);
          if (fromP31) return { industry: fromP31, source: 'wikidata', title: hit.title };
          const desc = String(hit.description || '').toLowerCase();
          if (/\buniversity\b|\bcollege\b|\beducational institution\b/.test(desc)) {
            return { industry: 'Education', source: 'wikidata-desc', title: hit.title };
          }
          if (/\bgovernment\b|\bpublic agency\b|\bmunicipal\b/.test(desc)) {
            return { industry: 'Government', source: 'wikidata-desc', title: hit.title };
          }
          if (/\bnon-?profit\b|\bfoundation\b|\bcharity\b|\bphilanthrop/.test(desc)) {
            return { industry: 'Nonprofit / Foundation', source: 'wikidata-desc', title: hit.title };
          }
        }
      } catch (e) {
        console.warn('[enrich] wikidata entity type failed', e);
      }
      return null;
    }

    async function resolveDomain(companyName, financeFilterActive = false, skippedDomains = [], personContext = null) {
      // Fast path / unambiguous companies: never spend person-context search budget
      const skipPerson = isKnownUnambiguousCompany(companyName) || !isAmbiguousCompanyName(companyName);
      const effectivePerson = skipPerson ? null : personContext;

      const cacheKey = makeResolveCacheKey(companyName, financeFilterActive, skippedDomains, effectivePerson);
      if (resolveCache.has(cacheKey)) {
        const cached = resolveCache.get(cacheKey);
        console.log('[resolve] CACHE HIT', companyName, '->', cached?.domain || null);
        return cached ? { ...cached, fromCache: true } : null;
      }

      // Accumulates every Clearbit/search suggestion so the picker can show them
      // even when no single candidate passes strict verification.
      let gatheredCandidates = [];

      const store = (result) => {
        if (!result) {
          if (gatheredCandidates.length > 0) {
            result = {
              domain: gatheredCandidates[0].domain,
              isUnsure: true,
              matchedName: gatheredCandidates[0].name,
              industrySnippet: gatheredCandidates[0].snippet || 'Possible match (unconfirmed)',
              candidates: gatheredCandidates,
              alternativeDomains: gatheredCandidates.map(c => c.domain),
              alternatives: gatheredCandidates.map(c => c.snippet || c.name || c.domain),
              resolveMethod: 'name-only'
            };
            console.log('[resolve] no confident hit — returning', gatheredCandidates.length, 'picker candidates for', companyName);
          }
        } else {
          const merged = normalizeCandidates(
            result.candidates,
            gatheredCandidates,
            result.alternativeDomains,
            result.domain
              ? [{ domain: result.domain, name: result.matchedName || result.name || result.domain, snippet: result.industrySnippet || result.snippet || '' }]
              : []
          );
          if (merged.length) {
            result = {
              ...result,
              candidates: merged,
              alternativeDomains: merged.map(c => c.domain)
            };
          }
        }
        resolveCache.set(cacheKey, result);
        return result;
      };

      // No artificial latency on the hot path — real network time is enough
      if (!companyName || companyName.trim().length < 2) {
        return store(null);
      }

      // Internal labels / non-entity rows — skip search entirely
      if (isNonEntityCompany(companyName) || /\(\s*moderator\s*\)/i.test(companyName)) {
        console.log('[resolve] skipping non-entity label:', companyName);
        return store(null);
      }

      // Globally recognized firms: always prefer the canonical domain over lesser same-name hits
      const majorFirm = lookupMajorKnownFirm(companyName);
      if (majorFirm && !skippedDomains.includes(majorFirm.domain.toLowerCase())) {
        console.log('[resolve] MAJOR FIRM canonical', companyName, '->', majorFirm.domain);
        return store({
          domain: majorFirm.domain.toLowerCase(),
          isUnsure: false,
          matchedName: majorFirm.label,
          industrySnippet: `${majorFirm.label} · ${majorFirm.industry}`,
          alternatives: [],
          resolveMethod: 'name-only',
          fastPath: true
        });
      }

      // Check if we are running from a local server to execute real-time backend scrapers
      const isLocalServer = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port === '8081';
      if (isLocalServer) {
        try {
          const skipParam = (skippedDomains || []).join(',');
          const response = await fetch(`/api/enrich?name=${encodeURIComponent(companyName)}&skip=${encodeURIComponent(skipParam)}`);
          const ct = response.headers.get('content-type') || '';
          if (response.ok && ct.includes('application/json')) {
            const data = await response.json();
            if (data && !data.error && data.domain) {
              return store({
                domain: data.domain,
                isUnsure: !!data.isUnsure,
                apiData: data,
                matchedName: data.name || companyName,
                industrySnippet: data.industry || data.notes || '',
                candidates: normalizeCandidates(data.candidates, [{ domain: data.domain, name: data.name, snippet: data.industry }]),
                resolveMethod: 'name-only'
              });
            }
          }
        } catch (e) {
          console.error("Local enrichment API failed, falling back to local waterfall...", e);
        }
      }

      // Advanced query cleaning helper
      const getCleanedQuery = (name) => {
        return name
          .trim()
          .toLowerCase()
          .replace(/[,.]?\s*\b(inc|llc|co|corp|corporation|ltd|limited|gmbh|sa|as|ab|oy|bv|nv|pvt|plc|holdings|group|associates|global|international|advisors|management|consulting|services|solutions|systems|technologies|networks|labs|digital|media|design|creative|agency|studio|studios|collective|cooperative|coop|ventures|ventures\s+capital|capital|partners)\b/gi, "")
          .replace(/^the\s+/i, "")
          .replace(/\bcompany\b$/i, "")
          .replace(/\s+/g, " ")
          .trim();
      };

      let cleaned = getCleanedQuery(companyName);
      const baseCleaned = cleaned; // preserve pre-finance-augmented name for scoring

      // Waterfall Tier 0: Direct Catalogue Lookup (Ensures offline dictionary items resolve instantly)
      const localClean = cleaned.replace(/[^a-z0-9]/g, '');
      const rawKey = companyName.trim().toLowerCase();
      if (companyDictionary[rawKey]) {
        const d = companyDictionary[rawKey].domain.toLowerCase();
        if (!skippedDomains.includes(d)) {
          console.log('[resolve] FAST PATH dictionary', companyName, '->', d);
          return store({ domain: d, isUnsure: false, industrySnippet: companyDictionary[rawKey].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }
      if (companyDictionary[localClean]) {
        const d = companyDictionary[localClean].domain.toLowerCase();
        if (!skippedDomains.includes(d)) {
          console.log('[resolve] FAST PATH dictionary', companyName, '->', d);
          return store({ domain: d, isUnsure: false, industrySnippet: companyDictionary[localClean].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }
      for (const key in companyDictionary) {
        const d = companyDictionary[key].domain.toLowerCase();
        const keyNorm = key.replace(/[^a-z0-9]/g, '');
        if ((localClean === keyNorm || rawKey === key || localClean.includes(keyNorm) || keyNorm.includes(localClean)) && !skippedDomains.includes(d)) {
          // Avoid ultra-short accidental partials
          if (Math.min(localClean.length, keyNorm.length) < 4 && localClean !== keyNorm) continue;
          console.log('[resolve] FAST PATH dictionary fuzzy', companyName, '->', d);
          return store({ domain: d, isUnsure: false, industrySnippet: companyDictionary[key].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }

      // Finance Search Filter: augment SEARCH query only — never mutate the scoring key
      let searchQuery = cleaned;
      if (financeFilterActive) {
        const financeTerms = ["capital", "partners", "ventures", "investment", "holdings", "wealth", "finance", "fund", "equity", "management", "pe", "vc", "advisory", "advisors", "associates", "group", "fintech", "bank"];
        const hasFinanceTerm = financeTerms.some(term => cleaned.toLowerCase().includes(term));
        if (!hasFinanceTerm) {
          searchQuery = `${cleaned} capital`;
        }
      }

      const FINANCE_KW = ["capital", "partner", "venture", "investment", "fund", "holding", "wealth", "finance", "equity", "fintech", "bank", "asset", "credit", "lend", "hedge", "private equity", "pe ", " vc", "advisory", "advisors", "securities", "broker"];
      const NON_FINANCE_KW = ["museum", "foundation", "association", "school", "university", "college", "charity", "arts", "cultural", "publishing", "publisher", "reading", "reader", "bookstore", "book", "magazine", "newspaper", "media", "blog", "podcast", "restaurant", "cafe", "coffee", "retail", "apparel", "fashion", "gaming", "game", "studio", "film", "music", "hotel", "travel", "clinic", "hospital", "church", "nonprofit", "ngo"];

      const inferSnippet = (item) => {
        const name = (item.name || '').trim();
        const domain = (item.domain || '').toLowerCase();
        const blob = `${name} ${domain}`.toLowerCase();
        if (FINANCE_KW.some(k => blob.includes(k.trim()))) return name ? `${name} · finance` : 'finance-related';
        if (NON_FINANCE_KW.some(k => blob.includes(k))) {
          const hit = NON_FINANCE_KW.find(k => blob.includes(k));
          return name ? `${name} · ${hit}` : hit;
        }
        return name || domain;
      };

      // Best match scorer — returns rich match object for disambiguation
      // scoreAgainst: brand name used for domain/name similarity (NOT finance-augmented)
      const findBestDomainMatch = (suggestions, scoreAgainst) => {
        if (!suggestions || suggestions.length === 0) return null;
        const cleanQuery = scoreAgainst.toLowerCase().replace(/[^a-z0-9]/g, '');
        const rawLower = scoreAgainst.toLowerCase().trim();
        if (!cleanQuery) {
          const first = suggestions[0];
          return { domain: first.domain, name: first.name || '', score: 0, snippet: inferSnippet(first), ambiguous: true, alternatives: [] };
        }

        const commonTlds = ['com', 'co', 'io', 'net', 'org', 'edu', 'gov', 'ai', 'me', 'us', 'ca', 'uk'];
        const scored = [];

        for (const item of suggestions) {
          if (!item.domain) continue;
          if (skippedDomains.includes(item.domain.toLowerCase())) continue;
          const parts = item.domain.toLowerCase().split('.');
          const domBase = parts[0].replace(/[^a-z0-9]/g, '');
          const tld = parts[parts.length - 1];
          const nameLower = (item.name || '').toLowerCase();
          const blob = `${nameLower} ${domBase}`;
          
          let score = 0;
          // Exact Clearbit brand name match is the strongest signal
          if (nameLower === rawLower || nameLower.replace(/[^a-z0-9]/g, '') === cleanQuery) {
            score += 150;
          }
          if (domBase === cleanQuery) {
            score += 140; // exact apex domain (blackstone.com for "Blackstone")
          } else if (domBase.startsWith(cleanQuery) && domBase.length > cleanQuery.length + 1) {
            // Lesser compound domains like blackstonecap / blackstonecapital
            score += 25;
            score -= Math.min(50, (domBase.length - cleanQuery.length) * 8);
          } else if (cleanQuery.includes(domBase) || domBase.includes(cleanQuery)) {
            score += 50;
            score -= Math.abs(domBase.length - cleanQuery.length);
          } else {
            const tokens = scoreAgainst.toLowerCase().split(/\s+/).filter(t => t.length > 2);
            const hits = tokens.filter(t => nameLower.includes(t) || domBase.includes(t.replace(/[^a-z0-9]/g, '')));
            if (hits.length === 0) continue;
            score += hits.length * 20;
          }

          // Prefer the short canonical brand domain over longer lookalikes
          const major = lookupMajorKnownFirm(scoreAgainst);
          if (major && item.domain.toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0] === major.domain) {
            score += 200;
          } else if (major) {
            const majorBase = major.domain.split('.')[0];
            if (domBase !== majorBase && (domBase.includes(majorBase) || nameLower.includes(majorBase))) {
              score -= 100;
            }
          }

          if (commonTlds.includes(tld)) score += 20;
          else score -= 60;
          
          if (financeFilterActive) {
            const hasFinanceKeywords = FINANCE_KW.some(k => blob.includes(k.trim()));
            const hasNonFinanceKeywords = NON_FINANCE_KW.some(k => blob.includes(k));
            
            if (hasFinanceKeywords) score += 120;
            if (hasNonFinanceKeywords) score -= 180;
          }

          scored.push({
            domain: item.domain.toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0],
            name: item.name || '',
            score,
            snippet: inferSnippet(item),
            isFinance: FINANCE_KW.some(k => blob.includes(k.trim())),
            isNonFinance: NON_FINANCE_KW.some(k => blob.includes(k)),
            exactName: nameLower === rawLower || nameLower.replace(/[^a-z0-9]/g, '') === cleanQuery
          });
        }

        if (scored.length === 0) return null;
        scored.sort((a, b) => b.score - a.score);

        let best = scored[0];
        if (financeFilterActive && scored.length > 1) {
          const financeCandidate = scored.find(s => s.isFinance && !s.isNonFinance);
          const top = scored[0];
          if (financeCandidate && top.isNonFinance && financeCandidate.score >= top.score - 40) {
            best = financeCandidate;
          } else if (financeCandidate && !top.isFinance && financeCandidate.score >= top.score - 25) {
            best = financeCandidate;
          }
        }

        // Prefer exact brand-name Clearbit hit even if finance scoring shuffled order
        const exact = scored.find(s => s.exactName);
        if (exact && exact.score >= best.score - 30) best = exact;

        const runnerUp = scored.find(s => s.domain !== best.domain);
        const ambiguous = !!(
          runnerUp &&
          !best.exactName &&
          Math.abs(best.score - runnerUp.score) < 25 &&
          runnerUp.score > 30
        );
        const alternatives = scored.slice(0, 3).map(s => s.snippet).filter(Boolean);
        const alternativeDomains = scored.slice(0, 5).map(s => s.domain).filter(Boolean);
        const candidates = scored.slice(0, 5).map(s => ({
          domain: s.domain,
          name: s.name || s.domain,
          snippet: s.snippet || ''
        }));

        if (financeFilterActive && best.isNonFinance && !best.isFinance) {
          const financeAlt = scored.find(s => s.isFinance);
          if (financeAlt) {
            best = financeAlt;
          } else if (best.score < 80 && !best.exactName) {
            return {
              domain: best.domain,
              name: best.name,
              score: best.score,
              snippet: best.snippet,
              ambiguous: true,
              alternatives,
              alternativeDomains,
              candidates,
              deprioritized: true
            };
          }
        }

        return {
          domain: best.domain,
          name: best.name,
          score: best.score,
          snippet: best.snippet,
          ambiguous,
          alternatives,
          alternativeDomains,
          candidates,
          exactName: !!best.exactName
        };
      };

      // Helper to clean DuckDuckGo Infobox value links (e.g. "[https://zoom.us Official site]" -> "zoom.us")
      const extractUrlDomain = (str) => {
        if (!str) return '';
        // Match brackets first: [https://example.com Link text]
        const bracketMatch = str.match(/\[\s*(https?:\/\/[^\s\]]+)/i);
        let url = bracketMatch ? bracketMatch[1] : str;
        
        // Find general URL structure
        const urlMatch = url.match(/(https?:\/\/[^\s\/]+)/i);
        if (urlMatch) {
          url = urlMatch[1];
        }
        
        return url.toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
      };

      // Waterfall Tier 1: Clearbit suggest API (+ optional person-context disambiguation)
      const toResolveResult = (match, method = 'name-only') => {
        if (!match || !match.domain) return null;
        const isUnsure = !!(match.ambiguous || match.deprioritized) && !match.exactName && match.score < 120;
        const candidates = normalizeCandidates(
          match.candidates,
          (match.alternativeDomains || []).map(d => ({ domain: d })),
          [{ domain: match.domain, name: match.name, snippet: match.snippet }]
        );
        return {
          domain: match.domain,
          isUnsure,
          matchedName: match.name,
          industrySnippet: match.snippet,
          alternatives: match.alternatives || [],
          alternativeDomains: match.alternativeDomains || candidates.map(c => c.domain),
          candidates,
          resolveMethod: method
        };
      };

      const tryClearbitQueries = async (queries, scoreAgainst, method) => {
        let weak = null;
        for (const q of queries) {
          if (!q || !String(q).trim()) continue;
          try {
            const response = await fetch(`https://autocomplete.clearbit.com/v1/companies/suggest?query=${encodeURIComponent(q)}`);
            const data = await response.json();
            if (data && data.length > 0) {
              // Always keep every suggestion for the picker (even if scoring rejects them)
              gatheredCandidates = normalizeCandidates(
                gatheredCandidates,
                data.map(item => ({
                  domain: item.domain,
                  name: item.name || item.domain,
                  snippet: inferSnippet(item)
                }))
              );
              const match = findBestDomainMatch(data, scoreAgainst || baseCleaned || companyName);
              const resolved = toResolveResult(match, method);
              if (resolved && (!resolved.isUnsure || match.exactName || match.score >= 100)) {
                console.log('[resolve] Clearbit hit via', method, q, '->', resolved.domain);
                return resolved;
              }
              if (resolved && !weak) weak = resolved;
            }
          } catch (err) {
            console.warn('Clearbit query failed', q, err);
          }
        }
        return weak;
      };

      try {
        // Prefer unaugmented brand name BEFORE finance-augmented queries
        const firstToken = String(baseCleaned || companyName).trim().split(/\s+/)[0];
        const STOP_TOKENS = new Set(['office', 'west', 'new', 'the', 'city', 'of', 'and', 'for', 'group', 'fund', 'private', 'public', 'global', 'international', 'united', 'american', 'national']);
        const strippedLegal = String(companyName)
          .replace(/\b(llc|inc|ltd|limited|corp|corporation|co)\b/gi, '')
          .replace(/&/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        const strippedOrgSuffix = String(companyName)
          .replace(/\b(foundation|endowment|trust)\b/gi, '')
          .replace(/^office of\s+/i, '')
          .replace(/&/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        const nameOnlyQueries = [
          strippedLegal,
          strippedOrgSuffix,
          baseCleaned || companyName,
          companyName.replace(/&/g, ' ').replace(/\s+/g, ' ').trim(),
          companyName,
          searchQuery,
          (firstToken && firstToken.length >= 4 && !STOP_TOKENS.has(firstToken.toLowerCase())) ? firstToken : null
        ].filter((q, i, arr) => q && String(q).trim().length >= 2 && arr.indexOf(q) === i);

        let nameHit = await tryClearbitQueries(nameOnlyQueries, baseCleaned || companyName, 'name-only');
        let clearbitAltDomains = [
          ...((nameHit && nameHit.alternativeDomains) || []),
          ...gatheredCandidates.map(c => c.domain)
        ];

        // Also collect raw Clearbit domains for prominence (re-query best unaugmented once)
        try {
          for (const q of [strippedLegal, strippedOrgSuffix, baseCleaned || companyName].filter(Boolean)) {
            const cbRes = await fetch(`https://autocomplete.clearbit.com/v1/companies/suggest?query=${encodeURIComponent(q)}`);
            if (cbRes.ok) {
              const cbData = await cbRes.json();
              if (Array.isArray(cbData)) {
                gatheredCandidates = normalizeCandidates(
                  gatheredCandidates,
                  cbData.map(item => ({
                    domain: item.domain,
                    name: item.name || item.domain,
                    snippet: inferSnippet(item)
                  }))
                );
                clearbitAltDomains = [...new Set([
                  ...clearbitAltDomains,
                  ...cbData.map(x => String(x.domain || '').toLowerCase()).filter(Boolean)
                ])];
              }
            }
          }
        } catch (_) { /* non-fatal */ }

        // Prominence cross-check: prefer well-known Wikidata entity; else mark Potential
        if (nameHit && nameHit.domain) {
          const prominence = await crossCheckProminentDomain(
            companyName,
            nameHit.domain,
            baseCleaned,
            clearbitAltDomains
          );
          if (prominence) {
            if (prominence.action === 'override') {
              nameHit = {
                ...nameHit,
                domain: prominence.domain,
                isUnsure: false,
                matchedName: prominence.label || nameHit.matchedName,
                industrySnippet: prominence.snippet || nameHit.industrySnippet,
                alternatives: prominence.alternatives || [nameHit.domain, ...(nameHit.alternatives || [])].slice(0, 4),
                alternativeDomains: normalizeCandidates(
                  prominence.alternatives,
                  clearbitAltDomains,
                  [{ domain: prominence.domain, name: prominence.label, snippet: prominence.snippet }]
                ).map(c => c.domain),
                candidates: normalizeCandidates(
                  prominence.alternatives,
                  clearbitAltDomains,
                  nameHit.candidates,
                  [{ domain: prominence.domain, name: prominence.label, snippet: prominence.snippet }],
                  [{ domain: nameHit.domain, name: nameHit.matchedName, snippet: nameHit.industrySnippet }]
                ),
                resolveMethod: 'name-only',
                fastPath: true
              };
            } else if (prominence.action === 'ambiguous') {
              nameHit = {
                ...nameHit,
                domain: prominence.domain || nameHit.domain,
                isUnsure: true,
                alternatives: prominence.alternatives || [prominence.domain, nameHit.domain].filter(Boolean),
                alternativeDomains: normalizeCandidates(
                  prominence.alternatives,
                  clearbitAltDomains,
                  nameHit.candidates
                ).map(c => c.domain),
                candidates: normalizeCandidates(
                  prominence.alternatives,
                  clearbitAltDomains,
                  nameHit.candidates,
                  [{ domain: prominence.domain || nameHit.domain, name: prominence.label || nameHit.matchedName, snippet: prominence.snippet || nameHit.industrySnippet }]
                ),
                industrySnippet: `${nameHit.industrySnippet || nameHit.matchedName} · ambiguous candidates: ${(prominence.alternatives || []).join(' · ')}`
              };
            }
          }
        }

        const usePerson = effectivePerson && (effectivePerson.personName || effectivePerson.personTitle)
          && (isAmbiguousCompanyName(companyName) || (nameHit && nameHit.isUnsure) || !nameHit);

        if (usePerson) {
          const pName = effectivePerson.personName || '';
          const pTitle = effectivePerson.personTitle || '';
          const personQueries = [
            `${companyName} ${pName}`.trim(),
            `${pName} ${pTitle} ${companyName}`.trim(),
            `${pName} ${companyName} capital`.trim(),
            `${companyName} ${pTitle}`.trim()
          ].filter((q, i, arr) => q && arr.indexOf(q) === i);

          console.log('[resolve] person-context search for', companyName, '→', personQueries[0]);
          const personHit = await tryClearbitQueries(personQueries, baseCleaned || companyName, 'name+person');
          if (personHit && (!personHit.isUnsure || !nameHit || nameHit.isUnsure)) {
            return store({
              ...personHit,
              resolveMethod: 'name+person',
              industrySnippet: `${personHit.industrySnippet || personHit.matchedName || companyName}${pName ? ' · via ' + pName : ''}`
            });
          }
        }

        if (nameHit) {
          const fast = isKnownUnambiguousCompany(companyName) || (!nameHit.isUnsure && !isAmbiguousCompanyName(companyName));
          return store({ ...nameHit, fastPath: !!fast });
        }
      } catch (err) {
        console.warn("Clearbit suggest query failed, continuing waterfall:", err);
      }

      // Waterfall Tier 2: DuckDuckGo Instant Answer API (checks Wikipedia/Wikidata Infoboxes)
      try {
        // Query base cleaned first (not finance-augmented)
        let response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(baseCleaned)}&format=json&no_html=1`);
        let json = await response.json();
        
        let item = null;
        if (json.Infobox && json.Infobox.content) {
          item = json.Infobox.content.find(i => i.data_type === 'official_website' || i.label === 'Official Website');
          if (!item) {
            item = json.Infobox.content.find(i => i.label === 'Website');
          }
        }

        if (!item && companyName.toLowerCase().trim() !== baseCleaned) {
          response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(companyName)}&format=json&no_html=1`);
          json = await response.json();
          if (json.Infobox && json.Infobox.content) {
            item = json.Infobox.content.find(i => i.data_type === 'official_website' || i.label === 'Official Website');
            if (!item) {
              item = json.Infobox.content.find(i => i.label === 'Website');
            }
          }
        }

        // Org / government / foundation: try "official site" Instant Answer
        const looksLikeOrg = /\b(office of|university|foundation|comptroller|ministry|department of|city of|county of|state of|government|authority|board of|commission)\b/i.test(companyName);
        if (!item && looksLikeOrg) {
          response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(companyName + ' official website')}&format=json&no_html=1`);
          json = await response.json();
          if (json.Infobox && json.Infobox.content) {
            item = json.Infobox.content.find(i => i.data_type === 'official_website' || i.label === 'Official Website' || i.label === 'Website');
          }
          if (!item && json.AbstractURL) {
            const absDom = extractUrlDomain(json.AbstractURL);
            if (absDom && absDom.includes('.') && !absDom.includes('wikipedia.org')) {
              return store({
                domain: absDom,
                isUnsure: false,
                matchedName: json.Heading || companyName,
                industrySnippet: (json.Heading || companyName) + (json.AbstractText ? ` — ${json.AbstractText.slice(0, 80)}` : ''),
                alternatives: [],
                resolveMethod: 'name-only'
              });
            }
          }
        }

        if (item && item.value) {
          const domain = extractUrlDomain(item.value);
          if (domain && domain.includes('.')) {
            const snippet = (json.Heading || baseCleaned) + (json.AbstractText ? ` — ${json.AbstractText.slice(0, 80)}` : '');
            return store({
              domain,
              isUnsure: false,
              matchedName: json.Heading || companyName,
              industrySnippet: snippet,
              alternatives: [],
              resolveMethod: 'name-only'
            });
          }
        }
      } catch (err) {
        console.warn("DuckDuckGo Instant Answer request failed:", err);
      }

      // Waterfall Tier 3: Local Dictionaries
      if (companyDictionary[localClean]) {
        return store({ domain: companyDictionary[localClean].domain, isUnsure: false, industrySnippet: companyDictionary[localClean].industry, resolveMethod: 'name-only', fastPath: true });
      }

      for (const key in companyDictionary) {
        if (localClean.includes(key) || key.includes(localClean)) {
          return store({ domain: companyDictionary[key].domain, isUnsure: false, industrySnippet: companyDictionary[key].industry, resolveMethod: 'name-only', fastPath: true });
        }
      }

      // Block unverified test keys — and never invent domains (hallucination risk)
      if (["test", "asdf", "company", "xyz", "hello", "unknown"].includes(localClean)) {
        return store(null);
      }

      // Waterfall Tier 4: Wikipedia / Wikimedia for orgs, foundations, universities, government
      try {
        const orgVariants = [];
        const pushQ = (q) => {
          const t = String(q || '').trim();
          if (t && !orgVariants.some(x => x.toLowerCase() === t.toLowerCase())) orgVariants.push(t);
        };
        pushQ(companyName);
        pushQ(`${companyName} official website`);
        pushQ(baseCleaned);
        // Strip common org prefixes/suffixes for better Wikipedia hits
        pushQ(companyName.replace(/^office of\s+/i, '').trim());
        pushQ(companyName.replace(/\s*\(([^)]*)\)\s*/g, ' ').trim()); // drop (Moderator) etc.
        pushQ(companyName.replace(/\b(foundation|endowment|trust)\b/gi, '').replace(/\s+/g, ' ').trim());
        pushQ(companyName.replace(/\b(university)\s+foundation\b/i, 'university').trim());

        for (const wq of orgVariants) {
          if (!wq || wq.length < 3) continue;
          const openRes = await fetch(
            `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(wq)}&limit=5&namespace=0&format=json&origin=*`
          );
          if (!openRes.ok) continue;
          const openJson = await openRes.json();
          const titles = openJson[1] || [];
          if (!titles.length) continue;

          // Prefer a title that shares tokens with the query
          const qTokens = wq.toLowerCase().split(/\s+/).filter(t => t.length > 2);
          let bestIdx = 0;
          let bestScore = -1;
          titles.forEach((t, idx) => {
            const tl = t.toLowerCase();
            let s = qTokens.filter(tok => tl.includes(tok)).length * 10;
            if (tl === wq.toLowerCase()) s += 50;
            if (s > bestScore) { bestScore = s; bestIdx = idx; }
          });

          if (bestScore < 10 && qTokens.length > 1) continue;

          const title = titles[bestIdx];
          const wikiTitle = title;
          const wdRes = await fetch(
            `https://www.wikidata.org/w/api.php?action=wbgetentities&sites=enwiki&titles=${encodeURIComponent(wikiTitle)}&props=claims|descriptions&languages=en&format=json&origin=*`
          );
          if (!wdRes.ok) continue;
          const wd = await wdRes.json();
          const entities = wd.entities || {};
          const entity = Object.values(entities).find(e => e && e.claims && e.claims.P856);
          const claim = entity?.claims?.P856?.[0]?.mainsnak?.datavalue?.value;
          const domain = claim ? extractUrlDomain(claim) : '';
          const description = entity?.descriptions?.en?.value || '';

          if (domain && domain.includes('.') && !domain.includes('wikipedia.org')) {
            console.log('[resolve] Wikipedia/Wikidata official site', companyName, '->', domain, '(via', wq, ')');
            gatheredCandidates = normalizeCandidates(
              gatheredCandidates,
              [{ domain, name: wikiTitle, snippet: description || wikiTitle }]
            );
            return store({
              domain,
              isUnsure: gatheredCandidates.length > 1,
              matchedName: wikiTitle,
              industrySnippet: `${wikiTitle}${description ? ' · ' + description : ''}`,
              alternatives: titles.slice(0, 3),
              candidates: gatheredCandidates,
              resolveMethod: 'name-only'
            });
          }
        }
      } catch (err) {
        console.warn('Wikipedia org fallback failed:', err);
      }

      // No confident search hit — do not algorithmically guess a URL
      return store(null);
    }

    // Permanent constraint: Industry / Headcount / Founders / Location must never be templated.
    const UNKNOWN = 'Unknown';
    const enrichmentValueRegistry = {
      industry: new Map(),
      contacts: new Map(),
      notes: new Map(),
      reset() {
        this.industry.clear();
        this.contacts.clear();
        this.notes.clear();
      }
    };

    function isBlankOrUnknown(v) {
      if (v == null) return true;
      const s = String(v).trim();
      return !s || s === '-' || /^unknown$/i.test(s) || /^needs manual/i.test(s) || /^needs verification/i.test(s);
    }

    function normalizeEnrichValue(v) {
      return String(v || '').trim().toLowerCase().replace(/\s+/g, ' ');
    }

    /**
     * Hard rule: if the same founder/industry/notes text is about to be written for two
     * different domains in this batch, blank it to Unknown (shared boilerplate = bug signal).
     */
    function applyBatchUniquenessGuard(domain, fields) {
      const host = String(domain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
      const out = { ...fields };
      const guardedKeys = ['industry', 'contacts', 'notes'];
      for (const key of guardedKeys) {
        const raw = out[key];
        if (isBlankOrUnknown(raw)) {
          out[key] = UNKNOWN;
          continue;
        }
        const norm = normalizeEnrichValue(raw);
        // Ignore ultra-generic short tokens
        if (norm.length < 4) {
          out[key] = UNKNOWN;
          continue;
        }
        const owner = enrichmentValueRegistry[key].get(norm);
        if (owner && owner !== host) {
          console.warn(`[enrich] BLOCK duplicate ${key} "${raw}" already used by ${owner}; forcing Unknown for ${host}`);
          out[key] = UNKNOWN;
        } else {
          enrichmentValueRegistry[key].set(norm, host);
        }
      }
      // Headcount / location: never invent; blank → Unknown (no cross-company text collision check needed as often)
      if (isBlankOrUnknown(out.headcount)) out.headcount = UNKNOWN;
      if (isBlankOrUnknown(out.location)) out.location = UNKNOWN;
      if (isBlankOrUnknown(out.gender)) out.gender = UNKNOWN;
      return out;
    }

    async function fetchPageHtml(absoluteUrl, timeoutMs = 2800) {
      const proxyBuilders = [
        (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
        (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
      ];
      for (let i = 0; i < proxyBuilders.length; i++) {
        try {
          const controller = new AbortController();
          const t = setTimeout(() => controller.abort(), timeoutMs);
          const res = await fetch(proxyBuilders[i](absoluteUrl), { signal: controller.signal });
          clearTimeout(t);
          if (!res.ok) continue;
          let html = await res.text();
          if (html.trim().startsWith('{') && html.includes('"contents"')) {
            try { html = JSON.parse(html).contents || ''; } catch (_) {}
          }
          if (html && html.length >= 40) return html;
        } catch (_) { /* try next proxy */ }
      }
      return null;
    }

    function extractMeta(html, prop) {
      const patterns = [
        new RegExp(`<meta[^>]+(?:property|name)=["']${prop}["'][^>]+content=["']([^"']+)["']`, 'i'),
        new RegExp(`<meta[^>]+content=["']([^"']+)["'][^>]+(?:property|name)=["']${prop}["']`, 'i')
      ];
      for (const p of patterns) {
        const m = html.match(p);
        if (m?.[1]) return m[1].trim();
      }
      return '';
    }

    function stripHtmlToText(html) {
      return String(html || '')
        .replace(/<script[\s\S]*?<\/script>/gi, ' ')
        .replace(/<style[\s\S]*?<\/style>/gi, ' ')
        .replace(/<[^>]+>/g, ' ')
        .replace(/&nbsp;/gi, ' ')
        .replace(/&amp;/gi, '&')
        .replace(/&quot;/gi, '"')
        .replace(/&#39;/gi, "'")
        .replace(/\s+/g, ' ')
        .trim();
    }

    /**
     * Extract enrichment fields ONLY from scraped page HTML. No templates.
     */
    function extractEnrichmentFromHtml(html, companyName) {
      if (!html) {
        return { industry: UNKNOWN, headcount: UNKNOWN, location: UNKNOWN, contacts: UNKNOWN, gender: UNKNOWN, notes: UNKNOWN, source: 'none' };
      }

      const title = (html.match(/<title[^>]*>([^<]*)<\/title>/i)?.[1] || '').trim();
      const description = extractMeta(html, 'description') || extractMeta(html, 'og:description') || '';
      const siteName = extractMeta(html, 'og:site_name') || '';
      const footerMatch = html.match(/<footer[\s\S]{0,8000}<\/footer>/i);
      const footerText = footerMatch ? stripHtmlToText(footerMatch[0]).slice(0, 1500) : '';
      const aboutChunk = (() => {
        const m = html.match(/id=["']about["'][\s\S]{0,6000}|class=["'][^"']*about[^"']*["'][\s\S]{0,6000}/i);
        return m ? stripHtmlToText(m[0]).slice(0, 2000) : '';
      })();
      const bodyText = stripHtmlToText(html).slice(0, 8000);
      const corpus = `${title}. ${description}. ${siteName}. ${aboutChunk}. ${footerText}. ${bodyText}`;

      // Industry — entity type first (never let a program keyword override a university)
      let industry = UNKNOWN;
      const entityIndustry = inferEntityTypeIndustry(companyName, null);
      if (entityIndustry) {
        industry = entityIndustry;
      } else {
        const industryRules = [
          [/higher education|research university|ivy league|\buniversity\b|\bcollege\b/i, 'Education'],
          [/\bnonprofit\b|\bnon-profit\b|\bfoundation\b|\bcharity\b/i, 'Nonprofit / Foundation'],
          [/\bgovernment\b|\bmunicipal\b|\bfederal\b|\bpublic agency\b/i, 'Government'],
          [/venture capital|growth equity|private equity|seed (?:and|&) early-stage/i, 'Venture Capital'],
          [/fund administration|fund administrator/i, 'Fund Administration'],
          [/outsourced chief investment|OCIO/i, 'OCIO / Investment Management'],
          [/asset management|investment management|investment firm/i, 'Investment Management'],
          [/fintech|payments? infrastructure|financial technology/i, 'Financial Technology'],
          [/artificial intelligence|machine learning|language model/i, 'Artificial Intelligence'],
          [/software as a service|\bSaaS\b|productivity software/i, 'Software / SaaS'],
          [/e-?commerce|online retail/i, 'E-Commerce / Retail'],
          [/healthcare|biotech|therapeutics|clinical/i, 'Healthcare / Biotech'],
          [/legal services|law firm/i, 'Legal Services']
        ];
        for (const [re, label] of industryRules) {
          if (re.test(corpus)) { industry = label; break; }
        }
      }

      // Location — explicit city/region patterns from page/footer
      let location = UNKNOWN;
      const locPatterns = [
        /\b(?:based in|headquartered in|headquarters(?:\s+in)?|located in)\s+([A-Z][a-zA-Z .'-]+(?:,\s*[A-Z]{2})?)/,
        /\b([A-Z][a-zA-Z]+(?:\s[A-Z][a-zA-Z]+)?),\s*([A-Z]{2})\b(?:\s+\d{5})?/,
        /\b(New York|San Francisco|London|Paris|Berlin|Toronto|Austin|Seattle|Boston|Chicago|Los Angeles|Nashville|Mountain View|Cupertino|Redmond|Menlo Park),\s*([A-Z]{2}|UK|CA|NY|TX|WA|MA|IL|TN)?/i
      ];
      for (const re of locPatterns) {
        const m = corpus.match(re);
        if (m) {
          if (m[2]) location = `${m[1].replace(/^based in\s+/i, '').trim()}, ${m[2]}`.replace(/,\s*,/g, ',').trim();
          else location = m[1].replace(/^(?:based in|headquartered in|headquarters(?:\s+in)?|located in)\s+/i, '').trim();
          if (location.length > 3) break;
          location = UNKNOWN;
        }
      }

      // Headcount — only explicit employee counts on page
      let headcount = UNKNOWN;
      const hc = corpus.match(/\b(\d{1,3}(?:,\d{3})*\+?\s*[-–to]+\s*\d{1,3}(?:,\d{3})*\+?|\d{1,3}(?:,\d{3})*\+)\s*(?:employees|people|team members|professionals)\b/i);
      if (hc) headcount = hc[1].replace(/\s+/g, ' ').trim();

      // Founders / leadership — only explicit attributions on page
      // Note: name captures are intentionally case-sensitive so /i does not turn
      // "Founder and CEO" into a fake name like "and CEO".
      let contacts = UNKNOWN;
      const founderPatterns = [
        /(?:[Ff]ounded by|[Cc]o-founded by|[Ff]ounder[:\s]+|[Cc]o-[Ff]ounder[:\s]+)([A-Z][a-z]+(?:\s+[A-Z][a-z.'-]+){1,3})/,
        /([A-Z][a-z]+(?:\s+[A-Z][a-z.'-]+){1,3})\s*,?\s*(?:Founder|Co-Founder|CEO|Chief Executive Officer|Managing Partner|Managing Director)\b/
      ];
      const badName = /^(The|Our|This|With|And|Or|For|From|About|Meet|Team|Company|Board)\b|^(and|or)\b/i;
      for (const re of founderPatterns) {
        const m = corpus.match(re);
        if (m?.[1]) {
          const name = m[1].trim();
          if (
            name.split(/\s+/).length >= 2 &&
            name.length < 60 &&
            !badName.test(name) &&
            !/\b(?:CEO|CTO|CFO|Founder)\b/i.test(name)
          ) {
            contacts = name;
            break;
          }
        }
      }

      // Notes — prefer meta description if present and non-generic
      let notes = UNKNOWN;
      if (description && description.length > 20 && description.length < 280) {
        notes = description;
      } else if (aboutChunk && aboutChunk.length > 40) {
        notes = aboutChunk.slice(0, 180).trim();
      }

      // Page must at least mention the company (weak confirmation) for any non-unknown field
      const nameTokens = String(companyName || '').toLowerCase().split(/\s+/).filter(t => t.length > 2);
      const pageLower = corpus.toLowerCase();
      const mentionsCompany = nameTokens.length === 0 || nameTokens.some(t => pageLower.includes(t.replace(/[^a-z0-9]/g, '')));
      if (!mentionsCompany) {
        return { industry: UNKNOWN, headcount: UNKNOWN, location: UNKNOWN, contacts: UNKNOWN, gender: UNKNOWN, notes: UNKNOWN, source: 'scrape-unconfirmed' };
      }

      return { industry, headcount, location, contacts, gender: UNKNOWN, notes, source: 'scrape' };
    }

    function lookupDictionaryByDomain(domain) {
      const host = String(domain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
      for (const entry of Object.values(companyDictionary)) {
        if (String(entry.domain || '').toLowerCase() === host) return entry;
      }
      return null;
    }

    async function enrichCompanyDetails(domain, originalName, apiData = null) {
      const enrichKey = `v2|${String(domain || '').toLowerCase()}|${String(originalName || '').trim().toLowerCase()}`;
      if (enrichCache.has(enrichKey)) {
        console.log('[enrich] CACHE HIT', domain);
        // Still re-run uniqueness guard against current batch
        return applyBatchUniquenessGuard(domain, { ...enrichCache.get(enrichKey), fromCache: true });
      }

      const blank = {
        industry: UNKNOWN,
        headcount: UNKNOWN,
        location: UNKNOWN,
        contacts: UNKNOWN,
        gender: UNKNOWN,
        notes: UNKNOWN,
        enrichSource: 'none'
      };

      // 1) Prefer live scrape of homepage + about
      const host = String(domain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
      let scraped = blank;
      try {
        const homeHtml = await fetchPageHtml(`https://${host}/`, 3000);
        scraped = extractEnrichmentFromHtml(homeHtml, originalName);
        const needsMore = [scraped.industry, scraped.headcount, scraped.location, scraped.contacts].filter(v => isBlankOrUnknown(v)).length >= 3;
        if (needsMore) {
          const aboutHtml = await fetchPageHtml(`https://${host}/about`, 2800)
            || await fetchPageHtml(`https://${host}/about-us`, 2800)
            || await fetchPageHtml(`https://${host}/company`, 2800);
          if (aboutHtml) {
            const aboutFields = extractEnrichmentFromHtml(aboutHtml, originalName);
            scraped = {
              industry: !isBlankOrUnknown(scraped.industry) ? scraped.industry : aboutFields.industry,
              headcount: !isBlankOrUnknown(scraped.headcount) ? scraped.headcount : aboutFields.headcount,
              location: !isBlankOrUnknown(scraped.location) ? scraped.location : aboutFields.location,
              contacts: !isBlankOrUnknown(scraped.contacts) ? scraped.contacts : aboutFields.contacts,
              gender: UNKNOWN,
              notes: !isBlankOrUnknown(scraped.notes) ? scraped.notes : aboutFields.notes,
              enrichSource: 'scrape'
            };
          }
        } else {
          scraped = { ...scraped, enrichSource: 'scrape' };
        }
      } catch (e) {
        console.warn('[enrich] scrape failed', domain, e);
      }

      // Entity-type industry ALWAYS wins over scraped keyword noise.
      // Check TLD/name first, then Wikidata classification — only scrape Industry for businesses.
      const entityType = await lookupWikidataEntityType(originalName, host);
      if (entityType?.industry) {
        scraped = {
          ...scraped,
          industry: entityType.industry,
          enrichSource: scraped.enrichSource === 'none'
            ? `entity-type:${entityType.source}`
            : `${scraped.enrichSource}+entity-type:${entityType.source}`
        };
      }

      // 2) Real lookup only: curated dictionary entry that matches this exact domain
      //    (never invent founders/industry from name heuristics or name pools)
      const dictEntry = lookupDictionaryByDomain(host);
      if (dictEntry) {
        const merge = (scrapedVal, dictVal) => {
          if (!isBlankOrUnknown(scrapedVal)) return scrapedVal;
          if (isBlankOrUnknown(dictVal) || /^needs manual/i.test(String(dictVal)) || /^needs verification/i.test(String(dictVal))) {
            return UNKNOWN;
          }
          return dictVal;
        };
        // Founders: prefer curated domain lookup over weak homepage regex hits
        // (scraped names that equal the company name, or title fragments, are discarded)
        const scrapeContactOk = (() => {
          if (isBlankOrUnknown(scraped.contacts)) return false;
          const c = String(scraped.contacts).trim().toLowerCase();
          const n = String(originalName || '').trim().toLowerCase();
          if (c === n || n.includes(c) || c.includes(n)) return false;
          return true;
        })();
        const dictFounder = isBlankOrUnknown(dictEntry.founder) || /^needs manual/i.test(String(dictEntry.founder))
          ? UNKNOWN
          : dictEntry.founder;
        scraped = {
          industry: merge(scraped.industry, dictEntry.industry),
          headcount: merge(scraped.headcount, dictEntry.headcount),
          location: merge(scraped.location, dictEntry.location),
          contacts: !isBlankOrUnknown(dictFounder) ? dictFounder : (scrapeContactOk ? scraped.contacts : UNKNOWN),
          gender: merge(scraped.gender, dictEntry.gender),
          notes: merge(scraped.notes, dictEntry.notes),
          enrichSource: scraped.enrichSource === 'scrape' ? 'scrape+dictionary' : 'dictionary'
        };
      } else if (!isBlankOrUnknown(scraped.contacts)) {
        // No dictionary: still reject contacts that are just the company name
        const c = String(scraped.contacts).trim().toLowerCase();
        const n = String(originalName || '').trim().toLowerCase();
        if (c === n || n.includes(c) || c.includes(n)) scraped.contacts = UNKNOWN;
      }

      // 3) Optional API payload — only accept explicit fields, never invent defaults
      if (apiData) {
        const mergeApi = (scrapedVal, apiVal) => {
          if (!isBlankOrUnknown(scrapedVal)) return scrapedVal;
          if (isBlankOrUnknown(apiVal)) return UNKNOWN;
          return apiVal;
        };
        scraped = {
          industry: mergeApi(scraped.industry, apiData.industry),
          headcount: mergeApi(scraped.headcount, apiData.headcount),
          location: mergeApi(scraped.location, apiData.location),
          contacts: mergeApi(scraped.contacts, apiData.founder),
          gender: mergeApi(scraped.gender, apiData.gender),
          notes: mergeApi(scraped.notes, apiData.notes),
          enrichSource: scraped.enrichSource || 'api'
        };
      }

      // Guarantee no leftover blanks look "filled"
      const result = {
        industry: isBlankOrUnknown(scraped.industry) ? UNKNOWN : scraped.industry,
        headcount: isBlankOrUnknown(scraped.headcount) ? UNKNOWN : scraped.headcount,
        location: isBlankOrUnknown(scraped.location) ? UNKNOWN : scraped.location,
        contacts: isBlankOrUnknown(scraped.contacts) ? UNKNOWN : scraped.contacts,
        gender: isBlankOrUnknown(scraped.gender) ? UNKNOWN : scraped.gender,
        notes: isBlankOrUnknown(scraped.notes) ? UNKNOWN : scraped.notes,
        enrichSource: scraped.enrichSource || 'none'
      };

      const guarded = applyBatchUniquenessGuard(host, result);
      enrichCache.set(enrichKey, guarded);
      console.log('[enrich]', originalName, '->', guarded.enrichSource, {
        industry: guarded.industry,
        headcount: guarded.headcount,
        location: guarded.location,
        contacts: guarded.contacts
      });
      return guarded;
    }

    // --- SUPABASE AUTH + SHARED PROJECTS ---
    const SUPABASE_LS_KEY = 'plum_supabase_url';
    const SUPABASE_ANON_KEY = 'plum_supabase_anon_key';

    function getSupabaseConfig() {
      const fromWindow = window.PLUM_SUPABASE || {};
      const url = (localStorage.getItem(SUPABASE_LS_KEY) || fromWindow.url || '').trim();
      const anonKey = (localStorage.getItem(SUPABASE_ANON_KEY) || fromWindow.anonKey || '').trim();
      return { url, anonKey, configured: !!(url && anonKey) };
    }

    let _supabaseClient = null;
    function getSupabase() {
      const { url, anonKey, configured } = getSupabaseConfig();
      if (!configured || !window.supabase || !window.supabase.createClient) return null;
      if (!_supabaseClient) {
        _supabaseClient = window.supabase.createClient(url, anonKey, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        });
      }
      return _supabaseClient;
    }

    function formatSavedAt(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      } catch (_) {
        return String(iso);
      }
    }

    function LoginScreen({ onReady }) {
      const cfg = getSupabaseConfig();
      const [setupMode, setSetupMode] = useState(!cfg.configured);
      const [url, setUrl] = useState(cfg.url);
      const [anonKey, setAnonKey] = useState(cfg.anonKey);
      const [email, setEmail] = useState('');
      const [otpCode, setOtpCode] = useState('');
      const [awaitingCode, setAwaitingCode] = useState(false);
      const [msg, setMsg] = useState('');
      const [msgType, setMsgType] = useState('');
      const [busy, setBusy] = useState(false);

      const authRedirectTo = () => {
        // Prefer a clean origin path so magic-link redirects match Supabase Redirect URLs.
        const path = window.location.pathname || '/';
        return `${window.location.origin}${path === '/' ? '/' : path}`;
      };

      const saveConfig = () => {
        if (!url.trim() || !anonKey.trim()) {
          setMsgType('err');
          setMsg('Paste both Project URL and anon key from Supabase → Settings → API.');
          return;
        }
        localStorage.setItem(SUPABASE_LS_KEY, url.trim());
        localStorage.setItem(SUPABASE_ANON_KEY, anonKey.trim());
        _supabaseClient = null;
        window.PLUM_SUPABASE = { url: url.trim(), anonKey: anonKey.trim() };
        setSetupMode(false);
        setMsgType('ok');
        setMsg('Supabase connected. Enter your email to get a login link (or use Google).');
        onReady?.();
      };

      const signInWithProvider = async (provider) => {
        const sb = getSupabase();
        if (!sb) {
          setSetupMode(true);
          setMsgType('err');
          setMsg('Configure Supabase first.');
          return;
        }
        setBusy(true);
        setMsg('');
        const { error } = await sb.auth.signInWithOAuth({
          provider,
          options: {
            redirectTo: authRedirectTo(),
            queryParams: provider === 'google' ? { access_type: 'online', prompt: 'select_account' } : undefined
          }
        });
        if (error) {
          setBusy(false);
          setMsgType('err');
          setMsg(error.message || `Could not start ${provider} sign-in. Enable it under Authentication → Providers.`);
        }
      };

      const sendMagicLink = async (e) => {
        e.preventDefault();
        const sb = getSupabase();
        if (!sb) {
          setSetupMode(true);
          setMsgType('err');
          setMsg('Configure Supabase first.');
          return;
        }
        const trimmed = email.trim().toLowerCase();
        if (!trimmed || !trimmed.includes('@')) {
          setMsgType('err');
          setMsg('Enter a valid email address.');
          return;
        }
        setBusy(true);
        setMsg('');
        setOtpCode('');
        try {
          const { error } = await sb.auth.signInWithOtp({
            email: trimmed,
            options: {
              emailRedirectTo: authRedirectTo(),
              shouldCreateUser: true
            }
          });
          if (error) {
            const m = (error.message || '').toLowerCase();
            let hint = error.message || 'Could not send login link.';
            if (m.includes('rate') || m.includes('security purposes') || m.includes('after')) {
              hint = `${error.message} Free-tier email is limited (~2–4/hour). Wait a bit, check spam, or use Google / set up custom SMTP (see tip below).`;
            } else if (m.includes('smtp') || m.includes('error sending') || m.includes('unable to send')) {
              hint = `${error.message} Supabase’s built-in mailer failed — set custom SMTP (Resend) under Project Settings → Auth → SMTP, or use Continue with Google.`;
            }
            setMsgType('err');
            setMsg(hint);
            return;
          }
          setEmail(trimmed);
          setAwaitingCode(true);
          setMsgType('ok');
          setMsg(
            `Sent to ${trimmed}. Click the link in the email, or type the 6-digit code below. ` +
            `If nothing arrives in ~1 min: check Spam/Promotions, and in Supabase confirm Email is enabled + Redirect URL includes ${window.location.origin}.`
          );
        } catch (err) {
          setMsgType('err');
          setMsg(err.message || 'Network error sending login email.');
        } finally {
          setBusy(false);
        }
      };

      const verifyEmailCode = async (e) => {
        e.preventDefault();
        const sb = getSupabase();
        if (!sb) return;
        const token = otpCode.replace(/\s/g, '');
        if (!/^\d{6,8}$/.test(token)) {
          setMsgType('err');
          setMsg('Enter the 6-digit code from the email (update your Magic Link template to include {{ .Token }} if missing).');
          return;
        }
        setBusy(true);
        setMsg('');
        try {
          // Try email OTP first, then magiclink type (template-dependent).
          let result = await sb.auth.verifyOtp({
            email: email.trim().toLowerCase(),
            token,
            type: 'email'
          });
          if (result.error) {
            result = await sb.auth.verifyOtp({
              email: email.trim().toLowerCase(),
              token,
              type: 'magiclink'
            });
          }
          if (result.error) {
            setMsgType('err');
            setMsg(result.error.message || 'Invalid or expired code. Request a new link.');
            return;
          }
          setMsgType('ok');
          setMsg('Signed in.');
        } catch (err) {
          setMsgType('err');
          setMsg(err.message || 'Could not verify code.');
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="login-screen">
          <div className="login-card">
            <h1>Plum Alley Enrichment</h1>
            <p>
              {setupMode
                ? 'Connect your free Supabase project once, then sign in with email or Google.'
                : 'Enter your email for a one-click login link (no password). Or use Google / GitHub.'}
            </p>

            {setupMode ? (
              <div>
                <label>Supabase Project URL</label>
                <input
                  value={url}
                  onChange={(e) => setUrl(e.target.value)}
                  placeholder="https://xxxx.supabase.co"
                  autoComplete="off"
                />
                <label>Anon / public key</label>
                <input
                  value={anonKey}
                  onChange={(e) => setAnonKey(e.target.value)}
                  placeholder="eyJhbGciOi..."
                  autoComplete="off"
                />
                <button type="button" className="btn btn-primary" onClick={saveConfig}>
                  Save & continue
                </button>
                <p className="login-help">
                  Run <code>supabase/schema.sql</code>. Enable Email under Authentication → Providers.
                  Add <code>{typeof window !== 'undefined' ? window.location.origin : 'http://localhost:5173'}</code> to Redirect URLs.
                  For reliable email delivery, add custom SMTP (Resend) — see tip after login form.
                </p>
              </div>
            ) : (
              <div>
                <form onSubmit={sendMagicLink}>
                  <label>Email</label>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    placeholder="you@company.com"
                    autoFocus
                    required
                    autoComplete="email"
                  />
                  <button type="submit" className="btn btn-primary" disabled={busy}>
                    {busy && !awaitingCode ? 'Sending…' : 'Send login link'}
                  </button>
                </form>

                {awaitingCode ? (
                  <form onSubmit={verifyEmailCode} style={{ marginTop: '0.85rem' }}>
                    <label>Or enter code from email</label>
                    <input
                      type="text"
                      inputMode="numeric"
                      autoComplete="one-time-code"
                      value={otpCode}
                      onChange={(e) => setOtpCode(e.target.value.replace(/[^\d]/g, '').slice(0, 8))}
                      placeholder="123456"
                      maxLength={8}
                    />
                    <button type="submit" className="btn btn-primary" disabled={busy || otpCode.length < 6}>
                      {busy ? 'Verifying…' : 'Verify code & sign in'}
                    </button>
                  </form>
                ) : null}

                <div className="login-divider">or</div>

                <div className="login-oauth">
                  <button
                    type="button"
                    className="btn btn-oauth-google"
                    disabled={busy}
                    onClick={() => signInWithProvider('google')}
                  >
                    Continue with Google
                  </button>
                  <button
                    type="button"
                    className="btn btn-oauth-github"
                    disabled={busy}
                    onClick={() => signInWithProvider('github')}
                  >
                    Continue with GitHub
                  </button>
                </div>

                <p className="login-help">
                  <strong>Emails not arriving?</strong> Supabase’s free mailer often fails or hits a rate limit.
                  Fix: Supabase → Project Settings → Authentication → SMTP Settings → enable custom SMTP with{' '}
                  <a href="https://resend.com" target="_blank" rel="noreferrer">Resend</a> (free).
                  Also: Authentication → Email Templates → Magic Link — include{' '}
                  <code>{'{{ .Token }}'}</code> so the 6-digit code appears.
                  Auth logs: Authentication → Users / Logs.
                </p>

                <button
                  type="button"
                  className="btn"
                  style={{ width: '100%', justifyContent: 'center', marginTop: '0.5rem' }}
                  onClick={() => setSetupMode(true)}
                >
                  Reconfigure Supabase
                </button>
              </div>
            )}
            {msg ? <div className={`login-msg ${msgType}`}>{msg}</div> : null}
          </div>
        </div>
      );
    }

    // --- MAIN REACT APPLICATION ---

      // Live link verification: DNS + optional content, with proxy fallbacks.
      // Strong domain↔name match + DNS success is enough — do not fail solely because proxies are down.
      const verifyDomainLive = async (domain, companyName, options = {}) => {
        const log = (...args) => console.log('[verify]', domain, ...args);
        const cleanDom = String(domain || '').toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0].trim();
        const cleanComp = String(companyName || '').toLowerCase().trim();
        const cacheKey = makeVerifyCacheKey(cleanDom, cleanComp);

        if (verifyCache.has(cacheKey)) {
          const cached = verifyCache.get(cacheKey);
          log('CACHE HIT', cached.ok ? 'OK' : 'FAIL', cached.reason);
          return { ...cached, fromCache: true };
        }

        const storeVerify = (result) => {
          verifyCache.set(cacheKey, result);
          return result;
        };

        if (!cleanDom || !cleanDom.includes('.')) {
          log('FAIL invalid domain');
          return storeVerify({ ok: false, reason: 'Invalid domain' });
        }
        if (/\b(unknown|random|test|asdf)\b/.test(cleanComp)) {
          log('FAIL placeholder name');
          return storeVerify({ ok: false, reason: 'Placeholder company name' });
        }
        if (cleanDom.includes('invalid-link.fake') || cleanDom.includes('asdf')) {
          log('FAIL blocked domain');
          return storeVerify({ ok: false, reason: 'Blocked domain' });
        }

        const stripLegal = (s) => s
          .toLowerCase()
          .replace(/[,.]?\s*\b(inc|llc|l\.l\.c|co|corp|corporation|ltd|limited|gmbh|plc|llp|lp|sa|nv|bv|pvt|foundation|university|office|department|ministry)\b\.?/gi, ' ')
          .replace(/[^a-z0-9\s]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();

        const nameKey = stripLegal(cleanComp).replace(/\s+/g, '');
        const domParts = cleanDom.split('.');
        const domBase = (domParts.length > 2 && !['co', 'com', 'org', 'net', 'gov', 'edu'].includes(domParts[domParts.length - 2])
          ? domParts[domParts.length - 2]
          : domParts[0]).replace(/[^a-z0-9]/g, '');

        const domainStrongMatch = (() => {
          if (!nameKey || !domBase) return false;
          if (domBase === nameKey) return true;
          // Domain contains the brand (fordfoundation.org ↔ Ford Foundation → "ford")
          if (nameKey.length >= 3 && (domBase.includes(nameKey) || nameKey.includes(domBase))) {
            const ratio = Math.min(domBase.length, nameKey.length) / Math.max(domBase.length, nameKey.length);
            if (ratio >= 0.5 || domBase.startsWith(nameKey) || nameKey.startsWith(domBase)) return true;
          }
          // multi-word collapsed: "westvirginiauniversity" vs domain tokens
          const tokens = stripLegal(cleanComp).split(' ').filter(t => t.length > 2);
          if (tokens.length >= 2) {
            const joined = tokens.join('');
            if (domBase === joined || joined.includes(domBase) || domBase.includes(joined.slice(0, Math.min(12, joined.length)))) return true;
            if (tokens.filter(t => domBase.includes(t) || cleanDom.includes(t)).length >= Math.ceil(tokens.length * 0.6)) return true;
          }
          return false;
        })();

        log('domainStrongMatch=', domainStrongMatch, 'domBase=', domBase, 'nameKey=', nameKey, 'fastPath=', !!options.fastPath);

        // 1) DNS check via Google DNS-over-HTTPS
        let dnsOk = false;
        try {
          const dnsRes = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(cleanDom)}&type=A`);
          if (dnsRes.ok) {
            const dnsJson = await dnsRes.json();
            dnsOk = dnsJson.Status === 0 && Array.isArray(dnsJson.Answer) && dnsJson.Answer.length > 0;
            log('DNS', dnsOk ? 'OK' : 'FAIL', 'status=', dnsJson.Status, 'answers=', dnsJson.Answer?.length || 0);
          } else {
            log('DNS HTTP', dnsRes.status);
          }
        } catch (e) {
          log('DNS error', e.message || e);
        }

        if (!dnsOk) {
          // Retry once (short backoff)
          try {
            await new Promise(r => setTimeout(r, 200));
            const dnsRes = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(cleanDom)}&type=A`);
            const dnsJson = await dnsRes.json();
            dnsOk = dnsJson.Status === 0 && Array.isArray(dnsJson.Answer) && dnsJson.Answer.length > 0;
            log('DNS retry', dnsOk ? 'OK' : 'FAIL');
          } catch (e) {
            log('DNS retry error', e.message || e);
          }
        }

        if (!dnsOk) {
          log('FAIL DNS does not resolve');
          return storeVerify({ ok: false, reason: 'Domain does not resolve (DNS)' });
